    { q: "Pourquoi les énergies fossiles sont-elles critiquées ?", r: "Elles émettent du CO₂ (GES) et sont épuisables." },

    { q: "Une voiture à 100 km/h a-t-elle plus d'énergie qu'à 50 km/h ?", r: "4 fois plus (car v² → 2² = 4)." },

    { q: "Qu'est-ce que l'énergie nucléaire ?", r: "Énergie libérée par la fission ou fusion des noyaux atomiques." },

    { q: "Qu'est-ce que l'énergie hydraulique ?", r: "Énergie des chutes d'eau (barrages)." }

  ]},

  28: { titre: "Circuits électriques", cartes: [

    { q: "Énoncer la loi d'Ohm.", r: "U = R × I (U en volts, R en ohms, I en ampères)." },

    { q: "Formule de la puissance électrique.", r: "P = U × I (P en watts)." },

    { q: "Différence entre circuit série et circuit dérivation.", r: "Série : un seul chemin, même courant. Dérivation : plusieurs chemins, même tension." },

    { q: "Qu'est-ce qu'un court-circuit ?", r: "Chemin de très faible résistance qui contourne un récepteur, courant très élevé." },

    { q: "À quoi sert un fusible ou un disjoncteur ?", r: "À couper le circuit en cas de surintensité." },

    { q: "À quoi sert la prise de terre ?", r: "À évacuer le courant de fuite vers la terre (protection contre les électrocutions)." },

    { q: "Qu'est-ce qu'une résistance ?", r: "Composant qui s'oppose au passage du courant." },

    { q: "Qu'est-ce que la tension électrique ?", r: "Différence de potentiel entre deux points (en volts)." },

    { q: "Qu'est-ce que l'intensité du courant ?", r: "Débit d'électrons (en ampères)." },

    { q: "Qu'est-ce qu'un générateur ?", r: "Appareil qui fournit de l'énergie électrique (pile, batterie, alternateur)." }

  ]}

};



// Vérification

console.log("Chapitres Sciences chargés :", Object.keys(CHAPITRES_SC).length);

var currentCh=1, cartes=[], idx=0, revealed=false, progression={};

function kProg(){return 'fc_sc_ch'+currentCh;}

function saveProg(){localStorage.setItem(kProg(),JSON.stringify(progression));}

function loadProg(){try{progression=JSON.parse(localStorage.getItem(kProg())||'{}');}catch(e){progression={};}}

function getScore(q){return (progression[q.substring(0,30)]||{score:0}).score;}

function setScore(q,v){progression[q.substring(0,30)]={score:Math.min(3,Math.max(0,v))};saveProg();}

function melanger(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

function selectCartes(){

  var ch=CHAPITRES_SC[currentCh]; if(!ch)return[];

  var all=ch.cartes.slice();

  return melanger(all.filter(function(c){return getScore(c.q)===0;}))

    .concat(melanger(all.filter(function(c){return getScore(c.q)>0&&getScore(c.q)<3;})))

    .concat(melanger(all.filter(function(c){return getScore(c.q)>=3;})));

}

function updateStats(){

  var ch=CHAPITRES_SC[currentCh]; if(!ch)return;

  var mait=ch.cartes.filter(function(c){return getScore(c.q)>=3;}).length;

  var pct=Math.round(mait/ch.cartes.length*100);

  document.getElementById('stats').innerHTML='🔬 Ch.'+currentCh+' : '+ch.titre+' &nbsp;|&nbsp; ✅ '+mait+'/'+ch.cartes.length+' ('+pct+'%)';

  document.getElementById('progFill').style.width=pct+'%';

}

function afficherCarte(){

  if(idx>=cartes.length){

    document.getElementById('card').innerHTML='<div style="font-size:1.2rem;color:#5eaacf">🎉 Chapitre terminé !</div>';

    document.getElementById('btnJuger').style.display='none';

    document.getElementById('sesStats').textContent='Session terminée — '+cartes.length+' cartes.';

    return;

  }

  revealed=false;

  var c=cartes[idx];

  document.getElementById('cardTheme').textContent='Ch.'+currentCh+' — Score: '+getScore(c.q)+'/3';

  document.getElementById('cardQ').textContent=c.q;

  document.getElementById('cardR').textContent=c.r;

  document.getElementById('cardR').style.display='none';

  document.getElementById('cardHint').style.display='block';

  document.getElementById('btnJuger').style.display='none';

  document.getElementById('sesStats').textContent='Carte '+(idx+1)+'/'+cartes.length;

  updateStats();

}

function reveler(){

  if(revealed)return; revealed=true;

  document.getElementById('cardR').style.display='block';

  document.getElementById('cardHint').style.display='none';

  document.getElementById('btnJuger').style.display='flex';

}

function repondre(ok){

  var c=cartes[idx]; var s=getScore(c.q);

  setScore(c.q,ok?Math.min(s+1,3):0); idx++; afficherCarte();

}

function buildSelect(){

  var sel=document.getElementById('chapSel'); sel.innerHTML='';

  Object.keys(CHAPITRES_SC).forEach(function(n){

    var opt=document.createElement('option'); opt.value=n;

    opt.textContent=n+'. '+CHAPITRES_SC[n].titre; sel.appendChild(opt);

  });

}

function chargerChapitre(){

  currentCh=parseInt(document.getElementById('chapSel').value);

  loadProg(); cartes=selectCartes(); idx=0; afficherCarte();

}

window.onload=function(){

  buildSelect(); loadProg(); cartes=selectCartes(); afficherCarte();

  document.getElementById('chapSel').addEventListener('change',chargerChapitre);

  document.getElementById('card').addEventListener('click',reveler);

  document.getElementById('btnSais').addEventListener('click',function(){repondre(true);});

  document.getElementById('btnSaisP').addEventListener('click',function(){repondre(false);});

  document.getElementById('btnReset').addEventListener('click',function(){if(confirm('Reset ch.'+currentCh+' ?')){localStorage.removeItem(kProg());loadProg();cartes=selectCartes();idx=0;afficherCarte();}});

  document.getElementById('btnAll').addEventListener('click',function(){if(confirm('Reset tout SC ?')){for(var i=1;i<=28;i++)localStorage.removeItem('fc_sc_ch'+i);loadProg();cartes=selectCartes();idx=0;afficherCarte();}});

};

</script>
