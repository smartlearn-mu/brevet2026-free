function esc(s) {

  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

}



function buildGrid() {

  const grid = document.getElementById('grid');

  let html = '';

  SUJETS.forEach((s, idx) => {

    html += '<div class="card" onclick="ouvrirSujet(' + idx + ')">'

      + '<div class="card-top"><span class="card-num">Sujet ' + s.id + '</span><span class="badge">' + s.annee + '</span></div>'

      + '<div class="card-titre">' + esc(s.titre) + '</div>'

      + '<div class="card-meta">' + esc(s.session) + '</div>'

      + '<a class="card-pdf" href="' + s.pdf + '" target="_blank" onclick="event.stopPropagation()">📄 Sujet officiel PDF</a>'

      + '</div>';

  });

  grid.innerHTML = html;

}



function ouvrirSujet(idx) {

  const s = SUJETS[idx];

  document.getElementById('svTitre').innerHTML = 'DNB ' + s.annee + ' — ' + s.session;

  document.getElementById('svSub').textContent = s.titre;

  document.getElementById('svDl').href = s.pdf;

  document.getElementById('btnDl').onclick = () => telecharger(idx);



  let html = '';



  // SECTION DICTEE

  const didx = 'dict_' + idx;

  html += '<div class="section-box">'

    + '<div class="section-head"><span class="sec-badge badge-dict">Dictée</span><span style="font-size:12px;color:#9090a8">' + esc(s.dictee_auteur) + '</span></div>'

    + '<div class="section-body">'

    + '<div class="dictee-consigne">Le professeur lit la dictée à voix haute. Tapez ce que vous entendez.</div>'

    + '<textarea class="dictee-area" id="' + didx + '" placeholder="Écrivez la dictée ici..."></textarea>'

    + '<button class="btn-corriger-dict" onclick="corrigerDictee(' + idx + ',\'' + didx + '\')">✦ Corriger la dictée</button>'

    + '<div class="panel" id="panel_' + didx + '"></div>'

    + '</div></div>';



  // SECTION QUESTIONS

  html += '<div class="section-box">'

    + '<div class="section-head"><span class="sec-badge badge-red">Compréhension &amp; Grammaire</span><span style="font-size:12px;color:#9090a8">' + s.questions.length + ' questions</span></div>';

  s.questions.forEach((q, qi) => {

    const qid = 'q_' + idx + '_' + qi;

    const badge = q.type === 'comprehension' ? '<span class="q-badge qb-comp">Compréhension</span>' : '<span class="q-badge qb-gram">Grammaire</span>';

    html += '<div class="question" style="padding:14px 16px">'

      + badge

      + '<div class="q-texte">' + esc(q.texte) + '</div>'

      + '<textarea class="answer-area" id="ans_' + qid + '" placeholder="Réponse..."></textarea>'

      + '<button class="btn-corriger" onclick="corriger(' + idx + ',' + qi + ',\'' + qid + '\')">✦ Corriger avec IA</button>'

      + '<div class="panel" id="panel_' + qid + '"></div>'

      + '</div>';

  });

  html += '</div>';



  // SECTION REDACTION

  html += '<div class="section-box">'

    + '<div class="section-head"><span class="sec-badge badge-redac">Rédaction</span></div>'

    + '<div class="section-body">'

    + '<div class="redac-sujet"><strong>Sujet 1 :</strong> ' + esc(s.redaction_s1) + '</div>'

    + '<div class="redac-sujet"><strong>Sujet 2 :</strong> ' + esc(s.redaction_s2) + '</div>'

    + '<textarea class="answer-area" id="redac_' + idx + '" style="min-height:180px" placeholder="Rédigez votre texte ici..."></textarea>'

    + '<button class="btn-corriger" onclick="corrigerRedac(' + idx + ')">✦ Corriger la rédaction</button>'

    + '<div class="panel" id="panel_redac_' + idx + '"></div>'

    + '</div></div>';



  document.getElementById('svContent').innerHTML = html;

  document.getElementById('landing').style.display = 'none';

  const sv = document.getElementById('sujetView');

  sv.style.display = 'block';

  sv.classList.add('active');

  window.scrollTo(0,0);

}



function retour() {

  document.getElementById('sujetView').style.display = 'none';

  document.getElementById('sujetView').classList.remove('active');

  document.getElementById('landing').style.display = 'block';

  window.scrollTo(0,0);

}

function badge(val) {

  const ok = (val === 'Oui' || val === 'OK');

  const partiel = (val === 'Partiel');

  const bg = ok ? 'rgba(94,207,177,.15)' : partiel ? 'rgba(245,166,35,.15)' : 'rgba(232,122,122,.15)';

  const col = ok ? '#5ecfb1' : partiel ? '#f5a623' : '#e87a7a';

  const icon = ok ? '✓' : partiel ? '◑' : '✗';

  return '<span style="background:'+bg+';color:'+col+';border:1px solid '+col+';border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700;">'+icon+' '+esc(val)+'</span>';

}



async function corrigerDictee(sIdx, did) {

  const s = SUJETS[sIdx];

  const texteEleve = document.getElementById(did).value.trim();

  if (!texteEleve) { alert('Écris ta dictée d\'abord !'); return; }



  const panel = document.getElementById('panel_' + did);

  const btn = panel.previousElementSibling;

  panel.classList.add('show');

  panel.innerHTML = '<div class="loading"><span class="dot"></span>Correction en cours...</div>';

  if (btn) btn.disabled = true;



  var typeQ = q.type || 'comprehension';
  var system = 'Tu es correcteur DNB FRANCAIS ' + (typeQ === 'comprehension' ? 'COMPREHENSION' : 'GRAMMAIRE') + ' — exigeant, bienveillant, precis.'
    + ' Question (' + pts + ' pts).'
    + ' COURS=' + Math.round(pts/3*2)/2 + ' pts / REDACTION=' + Math.round(pts/3*2)/2 + ' pts / METHODE=' + Math.round(pts/3*2)/2 + ' pts.'
    + (typeQ === 'comprehension'
      ? ' COURS: figures de style avec effet, vocabulaire litteraire, citations avec guillemets. REDACTION: reformulation personnelle, pas de copie. METHODE: nb elements demandes, point de vue+justification+citation.'
      : ' COURS: regle grammaticale, accord justifie, vocabulaire precis. REDACTION: reponse complete, tous les changements. METHODE: manipulation syntaxique, justification regle.'
    )
    + ' NOTE arrondie au 0.5 pres. JAMAIS 1.3/4.'
    + ' Question : ' + qTexteClean
    + ' Reponds UNIQUEMENT en JSON : {"note_cours":X,"note_redaction":X,"note_methode":X,"note_finale":X,"sur":' + pts + ',"commentaire":"3 lignes","pistes":"2 conseils"}';



  const prompt = `Texte officiel : ${s.dictee_texte}\nTexte de l'élève : ${texteEleve}`;



  try {

    const txt = await window.callIA(prompt, system);

    const json = window.safeJSON ? window.safeJSON(txt) : (()=>{try{return JSON.parse(txt.replace(/```json|```/g,'').trim());}catch(e){return null;}})();

    

    if (!STORE[s.id]) STORE[s.id] = [];

    STORE[s.id].push({

      type:'dictee', reponseEleve: texteEleve,

      correctionIA: json ? json.commentaire : txt,

      correctionOff: s.dictee_texte, note: json ? json.note : null, pts: 10

    });

    saveCorrections();



    let listeFautes = '';

    if (json && json.liste_fautes && json.liste_fautes.length) {

      listeFautes = '<div class="corr-conseil" style="margin-bottom:8px;"><strong>✗ Fautes détectées :</strong><br>' +

        json.liste_fautes.map(f => '• <em>' + esc(f.incorrect||'') + '</em> → <strong>' + esc(f.correct||'') + '</strong> — ' + esc(f.regle||'')).join('<br>') +

        '</div>';

    }



    panel.innerHTML = `

      <div class="corr-ia">

        <div class="corr-note">${json ? '✓ ' + json.note + ' / 10' : '? / 10'}</div>

        ${json && json.total_fautes != null ? '<div class="corr-conseil">📊 Total fautes : ' + json.total_fautes + '</div>' : ''}

        ${listeFautes}

        <div class="corr-txt">${json ? json.commentaire : txt}</div>

        ${json && json.pistes ? '<div class="corr-conseil" style="color:#e8c87a">🎯 ' + esc(json.pistes) + '</div>' : ''}

      </div>

      <div class="corr-off"><strong>📖 TEXTE OFFICIEL</strong><br>${esc(s.dictee_texte)}</div>

      <button class="btn-copy" onclick="copier(this)">📋 Copier</button>`;

  } catch(err) {

    let errMsg = err.message;

    if (errMsg === 'ACCES_BLOQUE') errMsg = 'Accès bloqué. Veuillez activer votre abonnement.';

    panel.innerHTML = '<div class="erreur">❌ ' + errMsg + '</div>';

  }

  if (btn) btn.disabled = false;

}



async function corriger(sIdx, qi, qid) {

  const s = SUJETS[sIdx];

  const q = s.questions[qi];

  const ans = document.getElementById('ans_' + qid).value.trim();

  if (!ans) { alert('Écris ta réponse d\'abord !'); return; }



  const panel = document.getElementById('panel_' + qid);

  const btn = panel.previousElementSibling;

  panel.classList.add('show');

  panel.innerHTML = '<div class="loading"><span class="dot"></span>Correction en cours...</div>';

  if (btn) btn.disabled = true;



  const pts = q.pts;

{"note":X,"sur":${pts},"cours_su":"Oui/Partiel/Non","methode":"Oui/Partiel/Non","commentaire":"analyse 3-5 lignes","pistes":"conseils précis"}`;



  const texteContext = (q.type === 'comprehension' && s.texte_sujet) ? 'TEXTE :\n' + s.texte_sujet + '\n\n' : '';

  const prompt = texteContext + `Question : ${qTexte}\nCorrection attendue : ${q.rep}\nRéponse élève : ${ans}`;



  try {

    const txt = await window.callIA(prompt, system);

    const json = window.safeJSON ? window.safeJSON(txt) : (()=>{try{return JSON.parse(txt.replace(/```json|```/g,'').trim());}catch(e){return null;}})();

    

    if (!STORE[s.id]) STORE[s.id] = [];

    STORE[s.id].push({

      type: q.type, qi: qi+1, question: q.texte.substring(0,80),

      reponseEleve: ans, correctionIA: json ? json.commentaire : txt,

      correctionOff: q.rep, pts: pts, note: json ? json.note : null

    });

    saveCorrections();



    panel.innerHTML = `

      <div class="corr-ia">

        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;">

          <div class="corr-note">✓ ${json ? json.note : '?'} / ${pts}</div>

          <div style="display:flex;gap:6px;flex-wrap:wrap;">

        </div>

        ${json && json.pistes ? '<div class="corr-conseil" style="margin-top:8px;color:#e8c87a">🎯 ' + esc(json.pistes) + '</div>' : ''}

      </div>

      <div class="corr-off"><strong>📖 CORRECTION OFFICIELLE</strong><br>${esc(q.rep)}</div>

      <button class="btn-copy" onclick="copier(this)">📋 Copier</button>`;

  } catch(err) {

    let errMsg = err.message;

    if (errMsg === 'ACCES_BLOQUE') errMsg = 'Accès bloqué. Veuillez activer votre abonnement.';

    panel.innerHTML = '<div style="color:#e87a7a">❌ ' + errMsg + '</div>';

  }

  if (btn) btn.disabled = false;

}



async function corrigerRedac(sIdx) {

  const s = SUJETS[sIdx];

  const ans = document.getElementById('redac_' + sIdx).value.trim();

  if (!ans) { alert('Écris ta rédaction d\'abord !'); return; }



  const panel = document.getElementById('panel_redac_' + sIdx);

  const btn = panel.previousElementSibling;

  panel.classList.add('show');

  panel.innerHTML = '<div class="loading"><span class="dot"></span>Correction en cours...</div>';

  if (btn) btn.disabled = true;



  const system = `Tu es correcteur expert DNB pour la RÉDACTION.

BARÈME sur 40 points :

- Adéquation au sujet (10 pts)

- Style et vocabulaire (10 pts)

- Orthographe et grammaire (10 pts)

- Structure (10 pts)



Réponds UNIQUEMENT en JSON sans markdown:

{"note":X,"sur":40,"criteres":{"adequation":X,"style":X,"orthographe":X,"structure":X},"commentaire":"analyse","pistes":"conseils"}`;



  const prompt = `Sujet 1 : ${s.redaction_s1}\nSujet 2 : ${s.redaction_s2}\n\nRédaction élève : ${ans}`;



  try {

    const txt = await window.callIA(prompt, system);

    const json = window.safeJSON ? window.safeJSON(txt) : (()=>{try{return JSON.parse(txt.replace(/```json|```/g,'').trim());}catch(e){return null;}})();

    

    if (!STORE[s.id]) STORE[s.id] = [];

    STORE[s.id].push({

      type:'redaction', reponseEleve: ans, correctionIA: json ? json.commentaire : txt,

      correctionOff: 'Sujet 1: ' + s.redaction_s1 + ' | Sujet 2: ' + s.redaction_s2,

      note: json ? json.note : null, pts: 40

    });

    saveCorrections();



    panel.innerHTML = `

      <div class="corr-ia">

        <div class="corr-note">${json ? '✓ ' + json.note + ' / 40' : '? / 40'}</div>

        ${json && json.criteres ? '<div class="corr-conseil">📊 Adéquation: '+(json.criteres.adequation||'?')+'/10 · Style: '+(json.criteres.style||'?')+'/10 · Ortho: '+(json.criteres.orthographe||'?')+'/10 · Structure: '+(json.criteres.structure||'?')+'/10</div>' : ''}

        <div class="corr-txt">${json ? json.commentaire : txt}</div>

        ${json && json.pistes ? '<div class="corr-conseil" style="color:#e8c87a">🎯 ' + esc(json.pistes) + '</div>' : ''}

      </div>

      <button class="btn-copy" onclick="copier(this)">📋 Copier</button>`;

  } catch(err) {

    let errMsg = err.message;

    if (errMsg === 'ACCES_BLOQUE') errMsg = 'Accès bloqué. Veuillez activer votre abonnement.';

    panel.innerHTML = '<div style="color:#e87a7a">❌ ' + errMsg + '</div>';

  }

  if (btn) btn.disabled = false;

}



async function copier(btn) {

  try {

    await navigator.clipboard.writeText(btn.parentElement.innerText);

    btn.textContent = '✓ Copié';

    setTimeout(() => btn.textContent = '📋 Copier', 2000);

  } catch(e) {}

}



function telecharger(sIdx) {

  const s = SUJETS[sIdx];

  const data = STORE[s.id];

  if (!data || !data.length) { alert('Corrige au moins une question d\'abord.'); return; }

  let totalObt = 0, totalMax = 0;

  data.forEach(c => { if (c.note != null) totalObt += parseFloat(c.note); totalMax += (c.pts || 0); });

  

  let html = `<html><head><meta charset="UTF-8"><style>

    body{font-family:Arial,sans-serif;font-size:13px;color:#111;padding:2rem;max-width:800px;margin:0 auto;}

    h1{font-size:18px;border-bottom:3px solid #c97de8;color:#7a2ea0;padding-bottom:8px;}

    h2{font-size:13px;margin-top:1.5rem;border-left:4px solid #c97de8;padding-left:10px;}

    .score{font-size:18px;font-weight:bold;color:#7a2ea0;margin:16px 0;padding:12px;background:#f9f0ff;border-radius:8px;}

    .ia{background:#fdf0ff;border-left:3px solid #c97de8;padding:10px;margin:8px 0;}

    .off{background:#e6f9ee;border-left:3px solid #34c76b;padding:10px;margin:8px 0;font-size:12px;}

    .eleve{background:#f0f0ff;border-left:3px solid #9090c8;padding:10px;margin:8px 0;}

  </style></head><body>

  <h1>📖 Corrections Français — ${s.annee} ${s.session}</h1>

  <div class="score">Score total : ${totalObt.toFixed(1)} / ${totalMax} (${Math.round(totalObt/totalMax*100)}%)</div>`;

  data.forEach(c => {

    const typeLabel = c.type === 'dictee' ? '📝 Dictée' : c.type === 'redaction' ? '✍️ Rédaction' : (c.type === 'comprehension' ? '🔍 Compréhension' : '📐 Grammaire');

    html += `<h2>${typeLabel}${c.qi ? ' — Q'+c.qi : ''}${c.note != null ? ' ('+c.note+'/'+(c.pts||'?')+')' : ''}</h2>`;

    if (c.question) html += `<div class="eleve"><strong>Question :</strong> ${esc(c.question)}</div>`;

    html += `<div class="eleve"><strong>✏️ Réponse élève :</strong><br>${esc(c.reponseEleve || '—')}</div>`;

    html += `<div class="ia"><strong>🤖 Analyse IA :</strong><br>${esc(c.correctionIA || '')}</div>`;

    html += `<div class="off"><strong>📖 Correction officielle :</strong><br>${esc(c.correctionOff || '')}</div>`;

  });

  html += '</body></html>';

  const win = window.open('','_blank');

  win.document.write(html);

  win.document.close();

  win.print();

}
