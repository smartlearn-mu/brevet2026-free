    { q: "Transition énergétique ?", r: "Passage aux énergies renouvelables." },

    { q: "Stress hydrique ?", r: "Manque d'eau disponible par rapport aux besoins." },

    { q: "Terres rares ?", r: "Métaux essentiels aux technologies (monopole chinois)." }

  ]}

};





var currentCh=1, cartes=[], idx=0, revealed=false, progression={};

var PARTIES={1:'Histoire',2:'Histoire',3:'Histoire',4:'Histoire',5:'Histoire',6:'Histoire',7:'Histoire',8:'Histoire',9:'Histoire',10:'Histoire',11:'Géographie',12:'Géographie',13:'Géographie',14:'Géographie',15:'Géographie',16:'Géographie',17:'Géographie',18:'Géographie',19:'Géographie',20:'Géographie',21:'Géographie',22:'Géographie',23:'EMC',24:'EMC',25:'EMC',26:'EMC',27:'EMC',28:'EMC',29:'EMC',30:'EMC',31:'EMC',32:'EMC'};



function kProg(){return 'fc_hg_ch'+currentCh;}

function saveProg(){localStorage.setItem(kProg(),JSON.stringify(progression));}

function loadProg(){try{progression=JSON.parse(localStorage.getItem(kProg())||'{}');}catch(e){progression={};}}

function getScore(q){return (progression[q.substring(0,30)]||{score:0}).score;}

function setScore(q,v){progression[q.substring(0,30)]={score:Math.min(3,Math.max(0,v))};saveProg();}

function melanger(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}



function selectCartes(){

  var ch=CHAPITRES_HG[currentCh]; if(!ch)return[];

  var all=ch.cartes.slice();

  var nouv=all.filter(function(c){return getScore(c.q)===0;});

  var enc=all.filter(function(c){return getScore(c.q)>0&&getScore(c.q)<3;});

  var mait=all.filter(function(c){return getScore(c.q)>=3;});

  return melanger(nouv).concat(melanger(enc)).concat(melanger(mait));

}



function updateStats(){

  var ch=CHAPITRES_HG[currentCh]; if(!ch)return;

  var total=ch.cartes.length;

  var mait=ch.cartes.filter(function(c){return getScore(c.q)>=3;}).length;

  var pct=Math.round(mait/total*100);

  document.getElementById('stats').innerHTML='🌍 Ch.'+currentCh+' : '+ch.titre+' &nbsp;|&nbsp; ✅ '+mait+'/'+total+' ('+pct+'%) &nbsp;|&nbsp; '+PARTIES[currentCh];

  document.getElementById('progFill').style.width=pct+'%';

}



function afficherCarte(){

  if(idx>=cartes.length){

    document.getElementById('card').innerHTML='<div style="font-size:1.2rem;color:#f5a623">🎉 Chapitre terminé !</div>';

    document.getElementById('btnJuger').style.display='none';

    document.getElementById('sesStats').textContent='Session terminée — '+cartes.length+' cartes.';

    return;

  }

  revealed=false;

  var c=cartes[idx];

  document.getElementById('cardTheme').textContent='Ch.'+currentCh+' — '+PARTIES[currentCh]+' — Score: '+getScore(c.q)+'/3';

  document.getElementById('cardQ').textContent=c.q;

  document.getElementById('cardR').textContent=c.r;

  document.getElementById('cardR').style.display='none';

  document.getElementById('card').querySelector('.fc-hint').style.display='block';

  document.getElementById('btnJuger').style.display='none';

  document.getElementById('sesStats').textContent='Carte '+(idx+1)+'/'+cartes.length;

  updateStats();

}



function reveler(){

  if(revealed)return; revealed=true;

  document.getElementById('cardR').style.display='block';

  document.getElementById('card').querySelector('.fc-hint').style.display='none';

  document.getElementById('btnJuger').style.display='flex';

}



function repondre(ok){

  var c=cartes[idx]; var s=getScore(c.q);

  setScore(c.q,ok?Math.min(s+1,3):0); idx++; afficherCarte();

}



function buildSelect(){

  var sel=document.getElementById('chapSel'); sel.innerHTML='';

  Object.keys(CHAPITRES_HG).forEach(function(n){

    var opt=document.createElement('option');

    opt.value=n;

    opt.textContent=n+'. ['+PARTIES[parseInt(n)]+'] '+CHAPITRES_HG[n].titre;

    sel.appendChild(opt);

  });

}



function chargerChapitre(){

  currentCh=parseInt(document.getElementById('chapSel').value);

  loadProg(); cartes=selectCartes(); idx=0; afficherCarte();

}



window.onload=function(){

  buildSelect(); loadProg(); cartes=selectCartes(); afficherCarte();

  document.getElementById('chapSel').addEventListener('change',chargerChapitre);

  document.getElementById('card').addEventListener('click',reveler);

  document.getElementById('btnSais').addEventListener('click',function(){repondre(true);});

  document.getElementById('btnSaisP').addEventListener('click',function(){repondre(false);});

  document.getElementById('btnReset').addEventListener('click',function(){if(confirm('Reset ch.'+currentCh+' ?')){localStorage.removeItem(kProg());loadProg();cartes=selectCartes();idx=0;afficherCarte();}});

  document.getElementById('btnAll').addEventListener('click',function(){if(confirm('Reset tout HG ?')){for(var i=1;i<=32;i++)localStorage.removeItem('fc_hg_ch'+i);loadProg();cartes=selectCartes();idx=0;afficherCarte();}});

};

</script>
