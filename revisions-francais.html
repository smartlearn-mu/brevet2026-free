// ══════════ RENDU ══════════

function buildSelect() {

  var sel = document.getElementById('chapSelect');

  sel.innerHTML = '';

  Object.keys(CHAPITRES_FR).forEach(function(n) {

    var opt = document.createElement('option');

    opt.value = n;

    opt.textContent = n + '. ' + CHAPITRES_FR[n].titre;

    sel.appendChild(opt);

  });

}



function afficherFiche() {

  var n = parseInt(document.getElementById('chapSelect').value);

  var ch = CHAPITRES_FR[n];

  var fiche = FICHES[n];

  if (!ch) return;



  // Tableau des 10 cartes

  var rows = '';

  ch.cartes.forEach(function(c) {

    rows += '<tr><td><span class="notion">' + c.q + '</span></td><td>' + c.r + '</td></tr>';

  });



  // Mini flashcards cliquables

  var fcItems = '';

  ch.cartes.forEach(function(c) {

    fcItems += '<div class="fc-item" onclick="this.classList.toggle(\'open\')">'

      + '<div class="fc-q">📖 ' + c.q + '</div>'

      + '<div class="fc-r">→ ' + c.r + '</div>'

      + '</div>';

  });



  document.getElementById('ficheZone').innerHTML =

    '<div class="fiche-title">Chapitre ' + n + ' — ' + ch.titre + '</div>'



    + (fiche ? '<div class="objectif">🎯 <strong>Objectif :</strong> ' + fiche.obj + '</div>' : '')



    + '<div class="notions-title">Toutes les notions du chapitre</div>'

    + '<table><thead><tr><th>Notion clé</th><th>Définition / Réponse</th></tr></thead><tbody>'

    + rows + '</tbody></table>'



    + (fiche ? '<div class="section-box"><h4>⚠ Pièges classiques</h4><p>' + fiche.pieges + '</p></div>' : '')

    + (fiche ? '<div class="section-box"><h4>💡 Conseil méthode</h4><p>' + fiche.conseil + '</p></div>' : '')



    + '<div class="section-box"><h4>🃏 Flashcards interactives — clique pour voir la réponse</h4>'

    + '<div class="fc-grid">' + fcItems + '</div></div>';

}



window.onload = function() {

  buildSelect();

  afficherFiche();

  document.getElementById('chapSelect').addEventListener('change', afficherFiche);

};

</script>
