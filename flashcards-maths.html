let currentChapitre = 1;
let currentCartes = [];
let currentIndex = 0;
let currentCard = null;
let progression = {};

function getStorageKey() { return `flashcards_maths_ch${currentChapitre}`; }
function sauvegarderProgression() { localStorage.setItem(getStorageKey(), JSON.stringify(progression)); }
function chargerProgression() {
  const saved = localStorage.getItem(getStorageKey());
  if (saved) progression = JSON.parse(saved);
  else progression = {};
}

function getCardKey(question) { return question.substring(0, 60); }
function getCartesChapitre() { return chapitres[currentChapitre]?.cartes || []; }

function initProgression() {
  const cartes = getCartesChapitre();
  let modif = false;
  for (const c of cartes) {
    const key = getCardKey(c.q);
    if (!progression[key]) {
      progression[key] = { score: 0, etat: "nouvelle" };
      modif = true;
    }
  }
  if (modif) sauvegarderProgression();
}

function melanger(tab) {
  for (let i = tab.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [tab[i], tab[j]] = [tab[j], tab[i]];
  }
  return tab;
}

function selectionnerCartesDuJour() {
  const cartes = getCartesChapitre();
  const nouvelles = cartes.filter(c => progression[getCardKey(c.q)]?.score === 0).slice(0, 20);
  const erreurs = cartes.filter(c => progression[getCardKey(c.q)]?.score > 0 && progression[getCardKey(c.q)]?.score < 3).slice(0, 10);
  const revoir = cartes.filter(c => progression[getCardKey(c.q)]?.score >= 3).slice(0, 5);
  let selected = [...nouvelles, ...erreurs, ...revoir];
  const ids = new Set();
  selected = selected.filter(c => { const k = getCardKey(c.q); if (ids.has(k)) return false; ids.add(k); return true; });
  return melanger(selected);
}

function mettreAJourStats() {
  const cartes = getCartesChapitre();
  let total = cartes.length;
  let maitrisees = 0;
  for (const c of cartes) {
    if (progression[getCardKey(c.q)]?.score >= 3) maitrisees++;
  }
  document.getElementById("stats").innerHTML = `ðŸ“š Chapitre ${currentChapitre} : ${chapitres[currentChapitre]?.titre || ""}<br>âœ… ${maitrisees}/${total} cartes maÃ®trisÃ©es (${Math.round(maitrisees/total*100)}%)`;
}

function afficherCarte() {
  if (currentIndex >= currentCartes.length) {
    document.getElementById("card-area").innerHTML = '<div class="progress">ðŸŽ‰ Bravo ! Chapitre terminÃ©. Change de chapitre.</div>';
    document.getElementById("session-stats").innerHTML = `âœ… Session terminÃ©e ! ${currentCartes.length} cartes revues.`;
    mettreAJourStats();
    return;
  }
  currentCard = currentCartes[currentIndex];
  const key = getCardKey(currentCard.q);
  const score = progression[key]?.score || 0;
  document.getElementById("card-area").innerHTML = `
    <div class="flashcard" onclick="revelerReponse()">
      <div class="question">ðŸ“– ${currentCard.q}</div>
      <div class="answer" id="answer">ðŸ“Œ ${currentCard.r}</div>
      <div class="show-answer">ðŸ‘† Cliquez pour voir la rÃ©ponse</div>
    </div>
    <div class="btn-group" id="btns" style="display:none;">
      <button onclick="repondre(true)">âœ… Je sais (${score}/3)</button>
      <button onclick="repondre(false)">âŒ Je ne sais pas</button>
    </div>
  `;
  document.getElementById("session-stats").innerHTML = `ðŸ“Œ Carte ${currentIndex+1}/${currentCartes.length} Â· Score: ${score}/3`;
}

window.revelerReponse = function() {
  document.getElementById("answer").style.display = "block";
  document.getElementById("btns").style.display = "flex";
};

window.repondre = function(reussi) {
  const key = getCardKey(currentCard.q);
  let score = progression[key]?.score || 0;
  if (reussi) score = Math.min(score + 1, 3);
  else score = 0;
  progression[key] = { score: score, etat: score >= 3 ? "maitrisee" : (score > 0 ? "en_cours" : "nouvelle") };
  sauvegarderProgression();
  currentIndex++;
  afficherCarte();
  mettreAJourStats();
};

function demarrerSession() {
  chargerProgression();
  initProgression();
  currentCartes = selectionnerCartesDuJour();
  currentIndex = 0;
  mettreAJourStats();
  if (currentCartes.length === 0) {
    document.getElementById("card-area").innerHTML = '<div class="progress">ðŸŽ‰ FÃ©licitations ! Toutes les cartes de ce chapitre sont maÃ®trisÃ©es.</div>';
    return;
  }
  afficherCarte();
}

function remplirChapitreSelect() {
  const select = document.getElementById("chapitreSelect");
  select.innerHTML = "";
  for (const [num, data] of Object.entries(chapitres)) {
    const option = document.createElement("option");
    option.value = num;
    option.textContent = `${num}. ${data.titre}`;
    select.appendChild(option);
  }
  select.value = currentChapitre;
}

document.getElementById("changerBtn").addEventListener("click", () => {
  currentChapitre = parseInt(document.getElementById("chapitreSelect").value);
  demarrerSession();
});

document.getElementById("resetChapitreBtn").addEventListener("click", () => {
  if (confirm(`RÃ©initialiser le chapitre ${currentChapitre} (${chapitres[currentChapitre]?.titre}) ?`)) {
    localStorage.removeItem(getStorageKey());
    demarrerSession();
  }
});

document.getElementById("resetAllBtn").addEventListener("click", () => {
  if (confirm("âš ï¸ Supprimer TOUTE progression dans TOUS les chapitres de mathÃ©matiques ?")) {
    for (const chap of Object.keys(chapitres)) {
      localStorage.removeItem(`flashcards_maths_ch${chap}`);
    }
    demarrerSession();
  }
});

remplirChapitreSelect();
demarrerSession();
</script>
