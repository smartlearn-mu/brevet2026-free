    { q: "Symétrie axiale (réflexion).", r: "Reflet par rapport à une droite. Orientation inversée" },

    { q: "Symétrie centrale.", r: "Reflet par rapport à un point (rotation 180°). Orientation inversée" },

    { q: "La translation conserve...", r: "Longueurs, angles, aires. L'orientation est conservée" },

    { q: "Symétrie axiale : propriété de l'axe.", r: "Un point et son image sont à la même distance de l'axe" },

    { q: "Symétrie centrale : le centre est...", r: "Le milieu du segment joignant un point et son image" },

    { q: "Rotation de 90°.", r: "Le quadrilatère a la même forme, tourné" }

  ]},

  17: { titre: "Solides (volumes)", cartes: [

    { q: "Volume d'un pavé droit.", r: "V = L × l × h" },

    { q: "Volume d'un prisme droit.", r: "V = Aire de la base × hauteur" },

    { q: "Volume d'un cylindre.", r: "V = π × r² × h" },

    { q: "Volume d'une pyramide.", r: "V = (Aire de la base × hauteur) / 3" },

    { q: "Volume d'un cône.", r: "V = (π × r² × h) / 3" },

    { q: "1 dm³ = ?", r: "1 L" },

    { q: "Cylindre r=2, h=5.", r: "V = 20π ≈ 62,8" },

    { q: "Pavé droit L=5, l=3, h=2.", r: "V = 30" }

  ]},

  18: { titre: "Scratch (algorithmique)", cartes: [

    { q: "Qu'est-ce qu'une variable en Scratch ?", r: "Un espace mémoire qui stocke une valeur" },

    { q: "Scratch : répéter 10 fois.", r: "Boucle 'répéter 10 fois'" },

    { q: "Scratch : structure conditionnelle.", r: "'si ... alors ... sinon ...'" },

    { q: "Scratch : orientation 90°.", r: "Le lutin se dirige vers la droite" },

    { q: "Carré de côté 50 en Scratch.", r: "Répéter 4 fois : avancer 50, tourner 90°" },

    { q: "Différence entre 'stylo écriture' et 'relever'.", r: "Écriture : trace. Relevé : ne trace pas" },

    { q: "Hexagone régulier : angle de rotation.", r: "60° (360°/6)" },

    { q: "Effacer tout ce qui a été tracé.", r: "'effacer tout'" }

  ]}

};



let currentChapitre = 1;

let currentCartes = [];

let currentIndex = 0;

let currentCard = null;

let progression = {};



function getStorageKey() { return `flashcards_maths_ch${currentChapitre}`; }

function sauvegarderProgression() { localStorage.setItem(getStorageKey(), JSON.stringify(progression)); }

function chargerProgression() {

  const saved = localStorage.getItem(getStorageKey());

  if (saved) progression = JSON.parse(saved);

  else progression = {};

}



function getCardKey(question) { return question.substring(0, 60); }

function getCartesChapitre() { return chapitres[currentChapitre]?.cartes || []; }



function initProgression() {

  const cartes = getCartesChapitre();

  let modif = false;

  for (const c of cartes) {

    const key = getCardKey(c.q);

    if (!progression[key]) {

      progression[key] = { score: 0, etat: "nouvelle" };

      modif = true;

    }

  }

  if (modif) sauvegarderProgression();

}



function melanger(tab) {

  for (let i = tab.length - 1; i > 0; i--) {

    const j = Math.floor(Math.random() * (i + 1));

    [tab[i], tab[j]] = [tab[j], tab[i]];

  }

  return tab;

}



function selectionnerCartesDuJour() {

  const cartes = getCartesChapitre();

  const nouvelles = cartes.filter(c => progression[getCardKey(c.q)]?.score === 0).slice(0, 20);

  const erreurs = cartes.filter(c => progression[getCardKey(c.q)]?.score > 0 && progression[getCardKey(c.q)]?.score < 3).slice(0, 10);

  const revoir = cartes.filter(c => progression[getCardKey(c.q)]?.score >= 3).slice(0, 5);

  let selected = [...nouvelles, ...erreurs, ...revoir];

  const ids = new Set();

  selected = selected.filter(c => { const k = getCardKey(c.q); if (ids.has(k)) return false; ids.add(k); return true; });

  return melanger(selected);

}



function mettreAJourStats() {

  const cartes = getCartesChapitre();

  let total = cartes.length;

  let maitrisees = 0;

  for (const c of cartes) {

    if (progression[getCardKey(c.q)]?.score >= 3) maitrisees++;

  }

  document.getElementById("stats").innerHTML = `📚 Chapitre ${currentChapitre} : ${chapitres[currentChapitre]?.titre || ""}<br>✅ ${maitrisees}/${total} cartes maîtrisées (${Math.round(maitrisees/total*100)}%)`;

}



function afficherCarte() {

  if (currentIndex >= currentCartes.length) {

    document.getElementById("card-area").innerHTML = '<div class="progress">🎉 Bravo ! Chapitre terminé. Change de chapitre.</div>';

    document.getElementById("session-stats").innerHTML = `✅ Session terminée ! ${currentCartes.length} cartes revues.`;

    mettreAJourStats();

    return;

  }

  currentCard = currentCartes[currentIndex];

  const key = getCardKey(currentCard.q);

  const score = progression[key]?.score || 0;

  document.getElementById("card-area").innerHTML = `

    <div class="flashcard" onclick="revelerReponse()">

      <div class="question">📖 ${currentCard.q}</div>

      <div class="answer" id="answer">📌 ${currentCard.r}</div>

      <div class="show-answer">👆 Cliquez pour voir la réponse</div>

    </div>

    <div class="btn-group" id="btns" style="display:none;">

      <button onclick="repondre(true)">✅ Je sais (${score}/3)</button>

      <button onclick="repondre(false)">❌ Je ne sais pas</button>

    </div>

  `;

  document.getElementById("session-stats").innerHTML = `📌 Carte ${currentIndex+1}/${currentCartes.length} · Score: ${score}/3`;

}



window.revelerReponse = function() {

  document.getElementById("answer").style.display = "block";

  document.getElementById("btns").style.display = "flex";

};



window.repondre = function(reussi) {

  const key = getCardKey(currentCard.q);

  let score = progression[key]?.score || 0;

  if (reussi) score = Math.min(score + 1, 3);

  else score = 0;

  progression[key] = { score: score, etat: score >= 3 ? "maitrisee" : (score > 0 ? "en_cours" : "nouvelle") };

  sauvegarderProgression();

  currentIndex++;

  afficherCarte();

  mettreAJourStats();

};



function demarrerSession() {

  chargerProgression();

  initProgression();

  currentCartes = selectionnerCartesDuJour();

  currentIndex = 0;

  mettreAJourStats();

  if (currentCartes.length === 0) {

    document.getElementById("card-area").innerHTML = '<div class="progress">🎉 Félicitations ! Toutes les cartes de ce chapitre sont maîtrisées.</div>';

    return;

  }

  afficherCarte();

}



function remplirChapitreSelect() {

  const select = document.getElementById("chapitreSelect");

  select.innerHTML = "";

  for (const [num, data] of Object.entries(chapitres)) {

    const option = document.createElement("option");

    option.value = num;

    option.textContent = `${num}. ${data.titre}`;

    select.appendChild(option);

  }

  select.value = currentChapitre;

}



document.getElementById("changerBtn").addEventListener("click", () => {

  currentChapitre = parseInt(document.getElementById("chapitreSelect").value);

  demarrerSession();

});



document.getElementById("resetChapitreBtn").addEventListener("click", () => {

  if (confirm(`Réinitialiser le chapitre ${currentChapitre} (${chapitres[currentChapitre]?.titre}) ?`)) {

    localStorage.removeItem(getStorageKey());

    demarrerSession();

  }

});



document.getElementById("resetAllBtn").addEventListener("click", () => {

  if (confirm("⚠️ Supprimer TOUTE progression dans TOUS les chapitres de mathématiques ?")) {

    for (const chap of Object.keys(chapitres)) {

      localStorage.removeItem(`flashcards_maths_ch${chap}`);

    }

    demarrerSession();

  }

});



remplirChapitreSelect();

demarrerSession();

</script>
