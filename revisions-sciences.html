function buildSelect() {

  var sel = document.getElementById('chapSel'); sel.innerHTML = '';

  Object.keys(CHAPITRES_SC).forEach(function(n) {

    var opt = document.createElement('option');

    opt.value = n;

    opt.textContent = n + '. ' + CHAPITRES_SC[n].titre;

    sel.appendChild(opt);

  });

}

function toggleFC(el) { el.classList.toggle('open'); }

function afficherFiche() {

  var n = parseInt(document.getElementById('chapSel').value);

  var ch = CHAPITRES_SC[n]; var fiche = FICHES_SC[n]; if (!ch) return;

  var rows = '';

  ch.cartes.forEach(function(c) { rows += '<tr><td><span class="notion">' + c.q + '</span></td><td>' + c.r + '</td></tr>'; });

  var fcItems = '';

  ch.cartes.forEach(function(c) { fcItems += '<div class="fc-item" onclick="toggleFC(this)"><div class="fc-q">🔬 ' + c.q + '</div><div class="fc-r">→ ' + c.r + '</div></div>'; });

  document.getElementById('ficheZone').innerHTML =

    '<div class="fiche-title">Chapitre ' + n + ' — ' + ch.titre + '</div>'

    + (fiche ? '<div class="objectif">🎯 <strong style="color:#5eaacf">Objectif :</strong> ' + fiche.obj + '</div>' : '')

    + '<table><thead><tr><th>Notion clé</th><th>Définition / Réponse</th></tr></thead><tbody>' + rows + '</tbody></table>'

    + (fiche ? '<div class="section-box"><h4>⚠ Pièges classiques</h4><p>' + fiche.pieges + '</p></div>' : '')

    + (fiche ? '<div class="section-box"><h4>💡 Conseil méthode</h4><p>' + fiche.conseil + '</p></div>' : '')

    + '<div class="section-box"><h4>🃏 Flashcards — clique pour voir la réponse</h4><div class="fc-grid">' + fcItems + '</div></div>';

}

window.onload = function() {

  buildSelect(); afficherFiche();

  document.getElementById('chapSel').addEventListener('change', afficherFiche);

};
