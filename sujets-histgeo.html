<style>

:root {

  --bg:#09090f; --s1:#111118; --s2:#1a1a24; --br:#2a2a38;

  --teal:#5ecfb1; --gold:#e8c87a; --red:#e87a7a;

  --amber:#f5a623; --amber-dim:#c4841a;

  --text:#e8e8f0; --dim:#9090a8; --muted:#5a5a72;

}

*{box-sizing:border-box;margin:0;padding:0;}

body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;}



/* LANDING */

.landing{max-width:960px;margin:0 auto;padding:48px 24px 80px;}

.eyebrow{font-family:'DM Mono',monospace;font-size:11px;color:var(--amber);letter-spacing:.15em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px;}

.eyebrow::before{content:'';width:24px;height:1px;background:var(--amber);}

.h1{font-family:'Syne',sans-serif;font-size:clamp(32px,6vw,54px);font-weight:800;line-height:1.08;margin-bottom:14px;}

.h1 em{font-style:normal;color:var(--amber);}

.sub{color:var(--dim);font-size:15px;max-width:520px;margin-bottom:24px;}

.pills{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:40px;}

.pill{display:flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--br);border-radius:20px;padding:5px 14px;font-size:12px;color:var(--dim);}

.pill span{color:var(--text);font-weight:500;}



/* LISTE DES SUJETS (verticale) */

.sujets-list{display:flex;flex-direction:column;gap:8px;max-width:720px;}

.sitem{display:flex;align-items:center;gap:12px;background:var(--s1);border:1px solid var(--br);border-radius:10px;padding:12px 16px;transition:border-color .2s;}

.sitem:hover{border-color:var(--teal);}

.sitem-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);min-width:60px;white-space:nowrap;}

.sitem-info{flex:1;}

.sitem-titre{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;margin-bottom:2px;}

.sitem-sub{font-size:11px;color:var(--dim);}

.sitem-tags{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap;}

.ctag{font-size:10px;padding:2px 7px;border-radius:4px;background:var(--s2);border:1px solid var(--br);color:var(--dim);}

.ctag.y25{border-color:#e8c87a44;color:var(--gold);}

.ctag.y24{border-color:#e8c87a44;color:var(--gold);}

.ctag.y23{border-color:#5ecfb144;color:var(--teal);}

.ctag.y22{border-color:#a07af544;color:#a07af5;}

.sitem-btns{display:flex;gap:6px;align-items:center;flex-shrink:0;}

.card-dl{display:flex;align-items:center;gap:5px;color:var(--amber);font-size:11px;font-family:'Syne',sans-serif;font-weight:700;text-decoration:none;background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.2);border-radius:5px;padding:4px 10px;transition:background .2s;}

.card-dl:hover{background:rgba(245,166,35,.16);}

.card-open{background:var(--amber);color:#09090f;font-family:'Syne',sans-serif;font-weight:700;font-size:11px;border:none;border-radius:5px;padding:5px 12px;cursor:pointer;transition:background .2s;}

.card-open:hover{background:var(--amber-dim);}



/* SUJET VIEW */

.sujet-view{display:none;max-width:900px;margin:0 auto;padding:24px;}

.sujet-view.active{display:block;}

.sv-header{display:flex;align-items:center;gap:14px;margin-bottom:28px;flex-wrap:wrap;}

.back-btn{display:flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--br);color:var(--dim);font-size:13px;padding:7px 14px;border-radius:7px;cursor:pointer;transition:.2s;text-decoration:none;}

.back-btn:hover{border-color:var(--amber);color:var(--amber);}

.sv-titre{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;flex:1;}

.sv-dl{display:flex;align-items:center;gap:6px;background:var(--amber);color:#09090f;font-family:'Syne',sans-serif;font-weight:700;font-size:12px;padding:8px 16px;border-radius:7px;text-decoration:none;white-space:nowrap;}

.sv-dl:hover{background:var(--amber-dim);}

.sv-warn{font-size:11px;color:var(--red);margin-top:4px;text-align:right;}



/* EXERCICES ET QUESTIONS */

.exo-header{display:flex;align-items:center;gap:8px;padding:14px 0 6px;border-top:1px solid var(--br);margin-top:8px;}

.exo-badge{font-size:11px;font-weight:700;font-family:'Syne',sans-serif;padding:3px 10px;border-radius:4px;}

.exo-badge.hist{background:rgba(245,166,35,.1);color:var(--amber);border:1px solid rgba(245,166,35,.3);}

.exo-badge.geo{background:rgba(94,207,177,.1);color:var(--teal);border:1px solid rgba(94,207,177,.3);}

.exo-badge.emc{background:rgba(160,122,245,.1);color:#a07af5;border:1px solid rgba(160,122,245,.3);}

.exo-pts{font-size:12px;color:var(--muted);}



.qblock{background:var(--s1);border:1px solid var(--br);border-radius:10px;padding:16px 18px 18px;margin-bottom:12px;}

.qnum{display:inline-block;font-family:'DM Mono',monospace;font-size:10px;color:var(--amber);background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.2);border-radius:4px;padding:2px 7px;margin-bottom:8px;}

.qtexte{font-size:14px;color:var(--text);margin-bottom:10px;line-height:1.55;}

textarea{width:100%;background:var(--s2);border:1px solid var(--br);border-radius:7px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:9px 12px;resize:vertical;min-height:52px;outline:none;transition:border-color .2s;}

textarea:focus{border-color:var(--amber);}

textarea::placeholder{color:var(--muted);}

.qbtns{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}

.btn-corriger{background:var(--amber);color:#09090f;border:none;border-radius:6px;font-family:'Syne',sans-serif;font-weight:700;font-size:11px;padding:6px 14px;cursor:pointer;transition:.15s;}

.btn-corriger:hover{background:var(--amber-dim);}

.btn-corriger:disabled{opacity:.4;cursor:not-allowed;}

.btn-off{background:var(--s2);color:var(--dim);border:1px solid var(--br);border-radius:6px;font-size:11px;padding:5px 10px;cursor:pointer;}

.btn-off:hover{border-color:var(--gold);color:var(--gold);}



.corr-panel{display:none;margin-top:10px;}

.corr-panel.show{display:block;}

.corr-ia{background:var(--s2);border-left:3px solid var(--amber);border-radius:0 7px 7px 0;padding:12px 14px;font-size:13px;}

.corr-note{color:var(--amber);font-weight:700;font-size:15px;margin-bottom:6px;}

.corr-txt{color:var(--text);white-space:pre-wrap;}

.corr-conseil{color:var(--dim);font-size:12px;margin-top:8px;}

.corr-off{margin-top:8px;background:rgba(232,122,122,.06);border-left:3px solid var(--red);border-radius:0 7px 7px 0;padding:10px 14px;font-size:13px;}

.corr-off strong{color:var(--red);display:block;margin-bottom:4px;font-size:11px;}

.corr-off-toggle{display:none;margin-top:8px;background:rgba(232,200,122,.06);border-left:3px solid var(--gold);border-radius:0 7px 7px 0;padding:10px 14px;font-size:13px;}

.corr-off-toggle.show{display:block;}

.corr-off-toggle strong{color:var(--gold);display:block;margin-bottom:4px;font-size:11px;}

.btn-copy{background:var(--s2);border:1px solid var(--br);color:var(--dim);font-size:11px;padding:4px 10px;border-radius:5px;cursor:pointer;margin-top:6px;}

.btn-copy:hover{border-color:var(--amber);color:var(--amber);}

.loading{color:var(--amber);font-style:italic;font-size:13px;padding:8px 0;}

.dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--amber);animation:p 1.2s ease-in-out infinite;margin-right:6px;}

@keyframes p{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.1)}}

.erreur{color:var(--red);font-size:13px;padding:8px 0;}



.export-zone{margin-top:20px;padding:12px 16px;background:var(--s2);border:1px dashed var(--br);border-radius:8px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}

.export-zone p{font-size:12px;color:var(--dim);}

.btn-pdf{background:var(--s2);border:1px solid var(--gold);color:var(--gold);font-family:'Syne',sans-serif;font-weight:700;font-size:11px;padding:7px 14px;border-radius:6px;cursor:pointer;}

.btn-pdf:hover{background:rgba(232,200,122,.1);}

</style>

<script>

function afficherOverlay(){if(document.getElementById('monet-overlay'))return;var canClose=estEnEssai();var o=document.createElement('div');o.id='monet-overlay';o.innerHTML='<style>#monet-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(9,9,15,0.97);z-index:99999;display:flex;align-items:center;justify-content:center;font-family:Arial,sans-serif;}.monet-card{background:#111118;border:1px solid #2a2a38;border-radius:16px;padding:32px 28px;max-width:460px;width:92%;color:#e8e8f0;text-align:center;}.monet-wise-btn{display:flex;align-items:center;justify-content:center;padding:13px 28px;border-radius:12px;font-weight:800;font-size:15px;text-decoration:none;background:#00b9ff;color:#fff;margin:12px 0;width:100%;box-sizing:border-box;border:none;cursor:pointer;}.monet-input{width:100%;background:#0d0d14;border:1px solid #2a2a38;border-radius:10px;color:#e8e8f0;font-size:15px;padding:12px 16px;text-align:center;outline:none;box-sizing:border-box;margin-bottom:10px;}.monet-btn{padding:11px 24px;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;border:1px solid rgba(94,207,177,0.3);background:rgba(94,207,177,0.1);color:#5ecfb1;margin:4px;}.monet-btn.ghost{background:transparent;color:#9090a8;border:1px solid #2a2a38;}.monet-msg{font-size:13px;margin-top:10px;min-height:24px;}</style><div class="monet-card"><div style="font-size:44px;margin-bottom:10px;">60</div><div style="font-size:22px;font-weight:800;color:#e8c87a;margin-bottom:8px;">Essai termine</div><div style="font-size:40px;font-weight:800;color:#5ecfb1;margin:8px 0;">29 EUR <span style="font-size:16px;color:#9090a8;">/ an</span></div><div style="background:#0d0d14;border-radius:10px;padding:14px;margin:12px 0;text-align:left;font-size:13px;line-height:2;">1. Cliquez Wise ci-dessous<br>2. Payez 29 EUR<br>3. Envoyez confirmation a <strong>smartlearn.mu@gmail.com</strong><br>4. Recevez votre code</div><a href="https://wise.com/pay/r/UeBUFQoUY_B5FYE" target="_blank" class="monet-wise-btn">Payer 29 EUR via Wise</a><hr style="border:none;border-top:1px solid #2a2a38;margin:16px 0;"><input type="text" class="monet-input" id="monet-code-input" placeholder="Votre code" maxlength="40"><div><button class="monet-btn" id="monet-valider">Valider le code</button>'+(canClose?'<button class="monet-btn ghost" id="monet-close">Continuer essai</button>':'')+' </div><div class="monet-msg" id="monet-msg"></div></div>';document.body.appendChild(o);document.getElementById('monet-valider').onclick=function(){var code=document.getElementById('monet-code-input').value.trim();var msg=document.getElementById('monet-msg');if(!code){msg.style.color='#e87a7a';msg.textContent='Entrez un code.';return;}msg.style.color='#9090a8';msg.textContent='Verification...';validerCode(code,function(r){if(r.success){msg.style.color='#5ecfb1';msg.textContent=r.message;setTimeout(function(){document.getElementById('monet-overlay').remove();location.reload();},1500);}else{msg.style.color='#e87a7a';msg.textContent=r.message;}});};var cl=document.getElementById('monet-close');if(cl)cl.onclick=function(){document.getElementById('monet-overlay').remove();};}

window.aAccesComplet=aAccesComplet;window.aAccesPayant=aAccesPayant;window.essaiExpire=essaiExpire;window.afficherBlocageEssaiExpire=afficherBlocageEssaiExpire;window.afficherOverlay=afficherOverlay;window.initMonetization=initMonetization;

<script>

const STORAGE_CORRECTIONS_KEY = 'hg_corrections_ia';

const STORE = {};



// Charger les corrections sauvegardées

try {

  const saved = JSON.parse(localStorage.getItem(STORAGE_CORRECTIONS_KEY) || '{}');

  Object.assign(STORE, saved);

} catch(e) {}



// Helper pour sauvegarder

function saveCorrections() {

  try {

    localStorage.setItem(STORAGE_CORRECTIONS_KEY, JSON.stringify(STORE));

  } catch(e) {}

}



const SUJETS = [

  {

    id:1, annee:'2025', session:'Métropole (juin)',

    titre:'25GENHGEMCME1 — Géo: Vallée de la batterie · Hist: Décolonisation · EMC: Égalité femmes-hommes',

    pdf:'https://hg.ac-besancon.fr/wp-content/uploads/sites/63/2025/07/dipl-me-national-du-brevet-2025-histoire-g-ographie-enseignement-moral-et-civique-228363.pdf',

    tags:[{t:'2025',c:'y25'}],

    exos:[

      {type:'geo',label:'EXERCICE 1 — Géographie (20 pts)',pts:20,questions:[

        {texte:'Document 1 (texte sur la vallée de la batterie, Hauts-de-France). Q1 — Relevez un extrait du texte qui définit la gigafactory. (2 pts)',rep:'« usines de fabrication de batteries et de leurs composants »'},

        {texte:'Q2 — Identifiez deux types d\'acteurs qui participent au développement de la « vallée de la batterie ». (4 pts)',rep:'Acteurs publics : l\'État, la Région. Acteurs privés : les entreprises industrielles (Verkor, ACC, Envision AESC).'},

        {texte:'Document 2 (carte de la vallée de la batterie). Q3 — Situez « la vallée de la batterie ». (2 pts)',rep:'Dans la région Hauts-de-France, entre Dunkerque (nord), Douvrin (ouest) et Douai (est), près de la frontière belge.'},

        {texte:'Q4 — Caractérisez le type d\'espace productif auquel elle appartient. (4 pts)',rep:'Espace industriel en reconversion/mutation : ancienne région industrielle (mines, sidérurgie) se réinventant dans l\'industrie automobile électrique.'},

        {texte:'Documents 1 et 2 — Q5 — Montrez que la « vallée de la batterie » possède des atouts qui favorisent l\'implantation des gigafactories et qu\'elle est un espace productif important pour la région. (8 pts)',rep:'Atouts : proximité des usines automobiles (Renault, Stellantis), port de Dunkerque (logistique), main-d\'œuvre disponible, soutien public (60M€). Importance : 2 000 à 3 000 emplois directs par site, investissements de milliards d\'euros.'}

      {type:'hist',label:'EXERCICE 2 — Histoire (20 pts)',pts:20,questions:[

      {type:'emc',label:'EXERCICE 3 — EMC (10 pts)',pts:10,questions:[

        {texte:'Document 1 : affiche Ada Lovelace — « seulement 11% des étudiants en école d\'informatique sont des femmes ». Q1 — Identifiez l\'inégalité mise en avant par cette affiche. (2 pts)',rep:'Sous-représentation des femmes dans les filières informatiques : seulement 11% d\'étudiantes, malgré le rôle pionnier d\'Ada Lovelace.'},

        {texte:'Document 2 : article premier de la Constitution de la Ve République. Q2 — Relevez un extrait de la Constitution qui montre que l\'égalité est une valeur de la République. (2 pts)',rep:'« La loi favorise l\'égal accès des femmes et des hommes aux mandats électoraux et fonctions électives, ainsi qu\'aux responsabilités professionnelles et sociales. »'},

        {texte:'Q3 — L\'affiche met en avant Ada Lovelace. Expliquez l\'intérêt de recourir à cette figure pour corriger une inégalité. (2 pts)',rep:'Montrer un modèle féminin dans un domaine où les femmes sont absentes. Ada Lovelace prouve que les femmes ont toujours eu leur place en informatique. Effet inspirant pour les jeunes filles.'},

        {texte:'Q4 — Vous devez rédiger un discours à l\'occasion du 8 mars. Montrez que les inégalités femmes-hommes existent encore et présentez deux idées concrètes pour sensibiliser les élèves. (4 pts)',rep:'Inégalités : écart salarial 17%, sous-représentation en informatique. Idées : atelier débat sur les stéréotypes, invitation de femmes pionnières dans des métiers masculins.'}

      ]}

    ]

  },

  {

    id:2, annee:'2025', session:'Asie-Pacifique',

    titre:'25GENHGEMCAA1 — Hist: Civils et militaires 1GM (Viviani) · Géo: Aménager inégalités · EMC: Valeurs et symboles République JO 2024',

    pdf:'https://www.education.gouv.fr/sites/default/files/2025-06/dipl-me-national-du-brevet-2025-histoire-g-ographie---enseignement-moral-et-civique-441168.pdf',

    tags:[{t:'2025',c:'y25'}],

    exos:[

      {type:'hist',label:'EXERCICE 1 — Histoire (20 pts)',pts:20,questions:[

        {texte:'Document 1 : Appel aux femmes françaises de René Viviani, 7 août 1914. Q1 — Rappelez le contexte dans lequel le président du Conseil des ministres a prononcé cet appel. (4 pts)',rep:'Début de la Première Guerre mondiale : l\'Allemagne a déclaré la guerre à la France (3 août 1914). Les hommes sont mobilisés au front. Il faut maintenir l\'activité agricole et économique.'},

        {texte:'Q2 — Expliquez pourquoi le gouvernement français s\'est adressé aux femmes dans ce contexte. (2 pts)',rep:'Les hommes étant partis au front, les femmes sont les seules disponibles pour remplacer les hommes dans les champs, les usines et les services.'},

        {texte:'Q3 — Relevez dans le texte deux éléments qui montrent que la mobilisation des femmes dans les campagnes était indispensable. (4 pts)',rep:'1) « la moisson est inachevée, le temps des vendanges est proche » 2) « maintenir l\'activité des campagnes » → approvisionnement de l\'armée et des villes en jeu.'},

        {texte:'Document 2 : atelier de fabrication d\'obus, Seine-Saint-Denis, mai 1917. Q4 — Pourquoi des femmes travaillaient-elles dans cet atelier en 1917 ? (deux éléments attendus) (4 pts)',rep:'1) Les hommes sont au front depuis 1914. 2) La guerre nécessite une production industrielle massive d\'armements → les femmes remplacent les hommes dans les usines.'},

        {texte:'Documents 1 et 2 — Q5 — À l\'aide des documents et de vos connaissances, expliquez comment les femmes ont participé à l\'effort de guerre pendant la Première Guerre mondiale. (6 pts)',rep:'Agriculture : moissons, vendanges. Industrie : usines d\'armement (munitionnettes). Soins : infirmières Croix-Rouge. Vie quotidienne : confection de vêtements militaires, ravitaillement.'}

      ]},

      {type:'geo',label:'EXERCICE 2 — Géographie (20 pts)',pts:20,questions:[

        {texte:'Développement construit d\'environ 20 lignes : montrez comment l\'aménagement du territoire permet de répondre aux inégalités entre les territoires en France. Appuyez-vous sur un ou plusieurs exemples. (14 pts)',rep:'Intro : inégalités territoriales fortes. 1) Inégalités : opposition métropoles/espaces ruraux (désertification médicale, enclavement). 2) Politiques : QPV, ZRR, Plan Action Cœur de Ville. 3) Exemple concret étudié en classe. Concl : l\'aménagement cherche à réduire les fractures territoriales.'},

        {texte:'Carte (annexe 7/7) — Q1a : Sur la carte, nommez deux métropoles. (2 pts)',rep:'Ex : Paris (métropole mondiale) + Lyon, Marseille, Bordeaux, Lille, Toulouse, Nantes, Nice (métropoles).'},

        {texte:'Q1b : Nommez un fleuve. (1 pt)',rep:'La Loire, la Garonne, la Seine, le Rhône ou le Rhin (au choix sur la carte).'},

        {texte:'Q1c : Nommez deux massifs montagneux. (1 pt)',rep:'Les Alpes, les Pyrénées, le Massif central, les Vosges, le Jura (deux au choix, visibles en gris sur la carte).'},

        {texte:'Q2 : Complétez la légende. (1 pt)',rep:'Compléter la case vide de la légende avec le figuré des zones grises = massifs montagneux.'},

        {texte:'Q3 : Représentez sur la carte un axe de communication terrestre majeur en utilisant le figuré de la légende. (1 pt)',rep:'Ex : l\'axe A6/A7 Paris-Lyon-Marseille (axe rhodanien), ou ligne TGV Paris-Lyon, ou autoroute du soleil.'}

      ]},

      {type:'emc',label:'EXERCICE 3 — EMC (10 pts)',pts:10,questions:[

        {texte:'Document 1 : photo d\'Axelle Saint-Cirel portant le drapeau tricolore, Marseillaise aux JO Paris 2024. Q1 — Identifiez deux symboles de la République française mis en avant lors de la cérémonie. (2 pts)',rep:'1) Le drapeau tricolore (bleu-blanc-rouge). 2) La Marseillaise (hymne national).'},

        {texte:'Document 2 : témoignage d\'Axelle Saint-Cirel sur les 10 statues de femmes illustres. Q2 — Que cherche à rappeler l\'apparition de ces statues lors de l\'interprétation de la chanteuse ? (2 pts)',rep:'Le combat des femmes pour leurs droits et leur place dans l\'Histoire (Olympe de Gouges, Simone Veil, Gisèle Halimi...). Célébrer la sororité et la lutte pour l\'égalité.'},

        {texte:'Q3 — Identifiez une valeur de la République française que l\'on peut associer à ce moment. Justifiez votre réponse. (2 pts)',rep:'Égalité : les femmes représentées ont combattu pour l\'égalité des droits. Ou Fraternité : solidarité entre femmes. Ou Liberté : liberté d\'expression artistique et civique.'},

        {texte:'Documents 1 et 2 — Q4 — Expliquez pourquoi il était important de mettre en avant les valeurs et les symboles de la République française lors de la cérémonie des Jeux Olympiques. (4 pts)',rep:'Les JO diffusés dans le monde → vitrine internationale. Montrer que la France incarne Liberté-Égalité-Fraternité. Hommage aux femmes de l\'Histoire devant 1 milliard de téléspectateurs. Renforce le sentiment national.'}

      ]}

    ]

  },

  {

    id:3, annee:'2024', session:'Métropole (juin)',

    titre:'24GENHGEMCME1 — Hist: WWII Auschwitz génocide · Géo: France et Europe dans le monde · EMC: Service Civique',

    pdf:'https://hg.ac-besancon.fr/wp-content/uploads/sites/63/2024/11/dipl-me-national-du-brevet-2024-histoire-g-ographie-enseignement-moral-et-civique-195917.pdf',

    tags:[{t:'2024',c:'y24'}],

    exos:[

      {type:'hist',label:'EXERCICE 1 — Histoire (20 pts)',pts:20,questions:[

        {texte:'Document 1 : témoignage de Ginette Kolinka, rescapée d\'Auschwitz-Birkenau (Retour à Birkenau, Grasset, 2020). Q1 — Identifiez la nature et l\'auteur de ce document. (2 pts)',rep:'Témoignage autobiographique de Ginette Kolinka, survivante juive du camp d\'Auschwitz-Birkenau, publié en 2020. Source primaire.'},

        {texte:'Q2 — Relevez trois passages du texte qui montrent différentes formes de violence que subissent les déportées. (6 pts)',rep:'1) Violence physique : « Si l\'une d\'entre nous défaille ou sort du rang, elle est frappée. » 2) Violence par l\'épuisement : « Des heures au garde-à-vous, gelées, tremblantes, épuisées. » 3) Violence par la faim : « Prenez un pain de mie, coupez-le en cinq [...] C\'est le repas du soir, de tous les jours. »'},

        {texte:'Q3 — Précisez à qui est confiée la surveillance des déportées dans le camp. (2 pts)',rep:'La surveillance est confiée aux kapos : des déportés eux-mêmes choisis pour faire régner l\'ordre dans le camp.'},

        {texte:'Document 2 : photographie SS, sélection des déportés à l\'arrivée au camp (mai-juin 1944). Q4 — Décrivez, à partir de la photographie, le processus de sélection des déportés à leur arrivée au camp. (4 pts)',rep:'Les déportés arrivent en grand nombre sur le quai. Les SS procèdent à une sélection : certains partent travailler (camp), les autres (vieux, enfants, malades) sont envoyés directement aux chambres à gaz.'},

        {texte:'Documents 1 et 2 — Q5 — Expliquez, à partir de l\'exemple du camp d\'Auschwitz-Birkenau, que les Juifs sont victimes d\'un génocide. (6 pts)',rep:'Génocide = destruction délibérée d\'un groupe. À Auschwitz : arrestations pour être Juif, déportation organisée, sélection à l\'arrivée, extermination de masse, 1,1 million de victimes dont 90% Juifs.'}

      ]},

      {type:'geo',label:'EXERCICE 2 — Géographie (20 pts)',pts:20,questions:[

        {texte:'Développement construit d\'une vingtaine de lignes : montrez la place et l\'influence culturelle, géopolitique et économique de la France et de l\'Europe dans le monde. (14 pts)',rep:'1) Culturelle : 1er pays touristique (86M visiteurs), 300M francophones, gastronomie, cinéma. 2) Géopolitique : siège permanent CSNU, OTAN, UE fondatrice. 3) Économique : 7e PIB, FMN (LVMH, Airbus). UE : 1er marché mondial, euro.'},

        {texte:'Carte annexe (Europe). Q1a — Nommez trois pays membres de l\'Union européenne de votre choix. (1,5 pt)',rep:'Au choix : Allemagne, Italie, Espagne, Pologne, Pays-Bas, Belgique, Portugal, Suède, Autriche...'},

        {texte:'Q1b — Nommez trois métropoles européennes de votre choix. (1,5 pt)',rep:'Au choix : Berlin, Rome, Madrid, Amsterdam, Varsovie, Vienne, Prague, Stockholm...'},

        {texte:'Q2 — À l\'aide du figuré de la légende, situez et nommez une métropole siège d\'une institution de l\'Union européenne de votre choix. (1 pt)',rep:'Bruxelles (Commission européenne + Conseil de l\'UE), Strasbourg (Parlement européen), Luxembourg (Cour de justice).'},

        {texte:'Q3 — Dans la légende, réalisez un figuré correspondant à la mégalopole européenne. Q4 — Sur la carte, localisez la mégalopole européenne. (2 pts)',rep:'Mégalopole européenne (Dorsale) : bande de Londres à Milan, passant par Paris, Bruxelles, Amsterdam, Cologne, Francfort. Figuré : hachures ou couleur sur cette zone.'}

      ]},

      {type:'emc',label:'EXERCICE 3 — EMC (10 pts)',pts:10,questions:[

        {texte:'Document 1 : page d\'accueil du site Service Civique (6 à 12 mois, 16-25 ans, 10 domaines, 601€/mois). Q1 — Relevez deux avantages pour un jeune qui s\'engage dans le Service Civique. (2 pts)',rep:'1) Ouvert sans condition de diplôme (16-25 ans). 2) Indemnisé : 601€/mois dont 489,59€ pris en charge par l\'État. 3) 10 domaines possibles.'},

        {texte:'Document 2 : témoignage de Bastien, 200 000e volontaire (mission parcs d\'Avignon, environnement). Q2 — Identifiez les deux expériences d\'engagement de Bastien. (2 pts)',rep:'1) Bénévole aux Restos du Cœur. 2) Mission Service Civique dans les parcs de la commune d\'Avignon (environnement).'},

        {texte:'Q3 — Précisez une valeur de la République à laquelle l\'engagement de Bastien peut être associé. (2 pts)',rep:'Fraternité : il aide les autres (Restos du Cœur, sensibilisation environnementale). Ou Égalité : il agit pour que tous aient accès à un environnement de qualité.'},

        {texte:'Documents 1 et 2 — Q4 — Bastien vient témoigner dans votre collège. Choisissez un des dix domaines du Service Civique et présentez une action que vous souhaiteriez mener en montrant les liens avec les valeurs de la République. (4 pts)',rep:'Ex : domaine « éducation pour tous » → aide aux devoirs → lien avec Égalité. Ou domaine « environnement » → plantation d\'arbres → lien avec Fraternité intergénérationnelle.'}

      ]}

    ]

  },

  {

    id:4, annee:'2024', session:'Amérique du Nord',

    titre:'24GENHGEMCAN1 — Hist: Guerre froide chute mur Berlin · Géo: Territoires ultramarins DROM · EMC: SNU',

    pdf:'https://www.education.gouv.fr/media/195323/download',

    tags:[{t:'2024',c:'y24'}],

    exos:[

      {type:'hist',label:'EXERCICE 1 — Histoire (20 pts)',pts:20,questions:[

        {texte:'Document 1 : témoignages sur la chute du mur de Berlin, 9 novembre 1989 (Europe 1, 2019). Q1 — Présentez et datez l\'événement décrit dans le document. (2 pts)',rep:'La chute du mur de Berlin, le 9 novembre 1989. Le mur séparait Berlin-Ouest (capitaliste) de Berlin-Est (communiste) depuis 1961.'},

        {texte:'Q2 — Relevez trois expressions du texte qui montrent le caractère exceptionnel de cet événement. (3 pts)',rep:'1) « Un événement comme ça, ça reste pour toujours dans ta tête ! » 2) « Sur le Ku\'damm, c\'était la folie ! » 3) « On rit, on pleure, on s\'embrasse, on danse. »'},

        {texte:'Q3 — Montrez que le régime politique en RDA était autoritaire. Deux éléments de réponse sont attendus. (4 pts)',rep:'1) « Normalement, ils devraient tirer » → les soldats avaient ordre de tirer sur les fuyards. 2) Besoin d\'une « autorisation spéciale pour sortir de RDA » → liberté de circuler interdite.'},

        {texte:'Q4 — À l\'aide de la phrase soulignée (il n\'y a plus besoin d\'autorisation spéciale pour sortir de RDA), expliquez quelle liberté est retrouvée par les Allemands de l\'Est. (3 pts)',rep:'La liberté de circulation : les Allemands de l\'Est peuvent désormais quitter leur pays et passer à Berlin-Ouest librement.'},

        {texte:'Document 2 : dessin de Plantu (Le Monde, 2 fév. 1990). Q5 — Relevez deux éléments qui prouvent que cet événement s\'inscrit dans un contexte de guerre froide. (4 pts)',rep:'1) Les deux drapeaux : RFA (Ouest, capitaliste) et RDA (Est, communiste). 2) Le dessin montre la réunification des deux Allemagnes séparées depuis 1945 par la guerre froide.'},

        {texte:'Documents 1 et 2 — Q6 — Expliquez deux conséquences de la chute du mur de Berlin pour les Allemands. (4 pts)',rep:'1) Liberté de circulation retrouvée, familles réunies. 2) Réunification allemande : le 3 octobre 1990, la RDA est absorbée par la RFA. Fin du communisme en Allemagne.'}

      ]},

      {type:'geo',label:'EXERCICE 2 — Géographie (20 pts)',pts:20,questions:[

        {texte:'Développement construit d\'une vingtaine de lignes : présentez les spécificités des territoires ultramarins et expliquez comment les aménagements permettent de réduire les inégalités. Appuyez-vous sur un ou plusieurs exemples. (14 pts)',rep:'1) Spécificités : éloignement (8h30 de Paris pour la Guyane), insularité, chômage élevé (22,9% en Guadeloupe), risques naturels (cyclones, volcans). 2) Aménagements : aéroport Guadeloupe Pôle Caraïbes, base Kourou, plan Chlordécone, fonds européens. 3) Résultats : PIB bien supérieur aux pays voisins.'},

        {texte:'Carte annexe — Indiquez la signification de DROM dans l\'emplacement correspondant. (2 pts)',rep:'DROM = Départements et Régions d\'Outre-Mer.'},

        {texte:'Sur la carte, placez le nom des trois océans sur les traits correspondants. (1,5 pt)',rep:'Océan Atlantique. Océan Indien. Océan Pacifique.'},

        {texte:'Placez le nom des 5 DROM dans les cadres numérotés 1 à 5. (2,5 pts)',rep:'1 : Guadeloupe ou Martinique (Caraïbes). 2 : Martinique ou Guadeloupe. 3 : Guyane (Amérique du Sud). 4 : La Réunion (Océan Indien). 5 : Mayotte (Océan Indien).'}

      ]},

      {type:'emc',label:'EXERCICE 3 — EMC (10 pts)',pts:10,questions:[

        {texte:'Document 1 : SNU dans les Pyrénées-Orientales. Q1 — Relevez quatre types d\'activités organisées lors de ce stage de SNU. (4 pts)',rep:'Activités sportives (randonnée, raquettes), initiation aux gestes de premiers secours, éducation musicale ou à l\'environnement, formation aux valeurs patriotiques (levée des couleurs, journée défense mémoire).'},

        {texte:'Q2 — Nommez deux acteurs qui encadrent le SNU. (2 pts)',rep:'Guillaume Stoecklin (chef SDJES), accompagnateur de montagne, Banque de France, un maire (représentant des institutions).'},

        {texte:'Document 2 : dépliant SNU 2023. Q3 — Identifiez deux symboles de la République française. (2 pts)',rep:'1) Le drapeau tricolore. 2) La devise « Liberté Égalité Fraternité ».'},

        {texte:'Documents 1 et 2 — Q4 — Expliquez pourquoi toutes les activités menées permettent de développer l\'engagement citoyen. (2 pts)',rep:'Chaque activité forme une facette de la citoyenneté : sport → respect collectif, premiers secours → solidarité, valeurs patriotiques → appartenance nationale, institutions → démocratie.'}

      ]}

    ]

  },

        {texte:'Document 1 : plan du réseau de transports de Toulouse avec le téléphérique Téléo. Q1 — Citez trois modes de transport visibles sur le plan. (3 pts)',rep:'Métro (lignes A et B), Bus, Téléphérique (Téléo), Parking vélos, Parking-relais, Aire de covoiturage.'},

        {texte:'Document 2 : article du Monde sur l\'inauguration de Téléo (13 mai 2022). Q2 — Identifiez trois acteurs qui ont permis la construction de cet aménagement. (3 pts)',rep:'La mairie de Toulouse, la Région, l\'État, l\'Union européenne.'},

        {texte:'Q3 — Expliquez la phrase soulignée dans le document 2 : « Téléo est un premier pas vers des transports transversaux, alors que les axes toulousains étaient jusqu\'alors construits en étoile. » (3 pts)',rep:'Les transports toulousains convergeaient tous vers le centre-ville (étoile). Téléo relie directement des pôles périphériques entre eux sans passer par le centre.'},

        {texte:'Documents 1 et 2 — Q4 — Montrez que le téléphérique vise à connecter différents modes de transport à Toulouse. (5 pts)',rep:'Téléo est raccordé au métro ligne B, aux bus, aux parkings vélos et parkings-relais. Il permet des correspondances entre modes de transport.'},

        {texte:'Q5 — À l\'aide des documents, expliquez que le renforcement des transports publics favorise l\'accès aux activités et aux services. (6 pts)',rep:'Le Téléo relie en 10 minutes l\'université Paul-Sabatier (30 000 étudiants), l\'hôpital Rangueil (210 000 consultations/an) et l\'Oncopole (4 500 emplois). Facilite l\'accès à l\'éducation, la santé et l\'emploi.'}

      ]},

      {type:'hist',label:'EXERCICE 2 — Histoire (20 pts)',pts:20,questions:[

        {texte:'Développement construit d\'une vingtaine de lignes : expliquez l\'accès à l\'indépendance d\'une colonie de votre choix. Précisez les principaux acteurs, les étapes et les conséquences. (14 pts)',rep:'Ex. Algérie : FLN, de Gaulle, pieds-noirs. 1er nov. 1954 → guerre → accords d\'Évian 1962 → indépendance juillet 1962. Conséquences : exode pieds-noirs, bilan humain lourd.'},

        {texte:'Annexe — Complétez le tableau. Création de l\'ONU : année ? (1 pt)',rep:'1945'},

        {texte:'Événement de 1962 (à trouver) ? (1 pt)',rep:'Crise de Cuba. Ou : indépendance de l\'Algérie (accords d\'Évian).'},

        {texte:'Traité de Rome : année ? (1 pt)',rep:'1957'},

        {texte:'Événement de 1989 (à trouver) ? (1 pt)',rep:'Chute du mur de Berlin.'},

        {texte:'Par un figuré de votre choix, situez la guerre froide sur la frise chronologique et précisez les années. (2 pts)',rep:'Guerre froide : 1947 → 1991. Figuré : accolade ou trait continu entre ces deux dates.'}

      ]},

      {type:'emc',label:'EXERCICE 3 — EMC (10 pts)',pts:10,questions:[

        {texte:'Document 1 : affiche Restos du Cœur « Devenez Bénévole, 3-4-5 mars 2023 ». Q1 — Citez l\'association à l\'origine de l\'affiche. (1 pt)',rep:'Les Restaurants du Cœur (Restos du Cœur).'},

        {texte:'Q2 — Présentez l\'objectif de l\'affiche. (2 pts)',rep:'Recruter des bénévoles pour la Collecte Nationale des 3, 4 et 5 mars 2023, afin de collecter des denrées alimentaires pour les personnes dans le besoin.'},

        {texte:'Document 2 : rapport sur le bénévolat 2022. Q3 — Identifiez deux domaines d\'intervention des bénévoles. (2 pts)',rep:'Éducation, social, handicap, santé, culture, sauvegarde de la biodiversité, aide alimentaire (deux au choix).'},

        {texte:'Documents 1 et 2 — Q4 — Expliquez ce qu\'est le bénévolat et ce qu\'il apporte à la société. (2 pts)',rep:'Bénévolat = engagement non rémunéré au service de l\'intérêt général. 22 millions de personnes engagées. Apports : solidarité, liens sociaux entre générations, action sur des domaines variés.'},

        {texte:'Q5 — Vous êtes membre du CVC. Proposez une action concrète avec un partenaire extérieur (Croix Rouge, Amnesty International, LICRA, ATD Quart Monde...) dans laquelle les élèves peuvent s\'engager. (3 pts)',rep:'Ex : partenariat Croix-Rouge → collecte alimentaire au collège. Ou LICRA → expo contre le racisme. Lien avec fraternité républicaine.'}

      ]}

    ]

    titre:'23GENHGEMCME1 — Hist: Civils WW1 (Juliette/affiche emprunt) · Géo: Espaces faible densité · EMC: Conseil municipal des jeunes',

    pdf:'https://hg.ac-besancon.fr/wp-content/uploads/sites/63/2023/10/sujet_DNB_juin_23GENHGEMCME.pdf',

    tags:[{t:'2023',c:'y23'}],

    exos:[

      {type:'hist',label:'EXERCICE 1 — Histoire (20 pts)',pts:20,questions:[

        {texte:'Document 1 : témoignage de Juliette Eychenne-Bareil, enfant à Carcassonne pendant la WW1 (1983). Q1 — Identifiez la nature de ce document. (2 pts)',rep:'Témoignage oral recueilli en 1983. Source primaire. L\'auteur était enfant (7 ans en 1914) à Carcassonne.'},

        {texte:'Q2 — Relevez trois extraits montrant les souffrances des civils. (6 pts)',rep:'1) « On manquait de beaucoup de choses » 2) « c\'était quand même la misère » 3) « il fallait faire des queues interminables pour avoir 2 kg [de pommes de terre] par personne »'},

        {texte:'Q3 — Montrez ce qu\'apporte ce document par rapport au point de vue d\'un soldat de la Première Guerre mondiale. (4 pts)',rep:'Un témoignage de soldat montre la vie dans les tranchées. Juliette montre la vie à l\'arrière : pénuries, mobilisation des femmes dans les usines, transformation des écoles en hôpitaux.'},

        {texte:'Document 2 : affiche Raoul Cabrol 1918 « L\'Emprunt des dernières cartouches ». Q4 — Décrivez l\'affiche en montrant comment les personnages représentent le front et l\'arrière. (4 pts)',rep:'En haut (front) : un soldat en uniforme, casque, fusil, dans les tranchées. En bas (arrière) : une femme et un enfant qui tendent les mains vers le soldat. Le soldat pointe vers les civils → appel à l\'effort.'},

        {texte:'Q5 — Expliquez l\'objectif de cette affiche. (2 pts)',rep:'Inciter les civils à souscrire à l\'emprunt de guerre pour financer l\'effort militaire. Slogan « Français, encore un effort ! »'},

        {texte:'Documents 1 et 2 — Q6 — Montrez comment les civils participent à l\'effort de guerre entre 1914 et 1918. (2 pts)',rep:'Femmes dans les usines d\'armement et les champs, enfants font les courses, souscription aux emprunts de guerre. Solidarité nationale à l\'arrière indispensable au front.'}

function buildLanding() {

  const grid = document.getElementById('grid');

  grid.innerHTML = '';

  SUJETS.forEach((s, i) => {

    const div = document.createElement('div');

    div.className = 'sitem';

    div.innerHTML = '<div class="sitem-num">S' + String(i+1).padStart(2,'0') + ' · ' + s.annee + '</div>'

      + '<div class="sitem-info">'

      + '<div class="sitem-titre">' + s.session + '</div>'

      + '<div class="sitem-sub">' + s.titre + '</div>'

      + '<div class="sitem-tags">' + (s.tags||[]).map(t=>'<span class="ctag ' + (t.c||'') + '">' + t.t + '</span>').join('') + '</div>'

      + '</div>'

      + '<div class="sitem-btns">'

      + '<a class="card-dl" href="' + s.pdf + '" target="_blank" onclick="event.stopPropagation()">⬇ PDF</a>'

      + '<button class="card-open" onclick="event.stopPropagation();ouvrirSujet(' + i + ')">Commencer →</button>'

      + '</div>';

    grid.appendChild(div);

  });

}



function ouvrirSujet(idx) {

  const s = SUJETS[idx];

  document.getElementById('landing').style.display = 'none';

  const view = document.getElementById('sujetView');

  view.classList.add('active');

  document.getElementById('svTitre').innerHTML = 

    'DNB ' + s.annee + ' — ' + s.session 

    + '<div style="font-size:12px;color:#9090a8;font-weight:400;margin-top:3px">' + s.titre + '</div>';

  document.getElementById('svDl').href = s.pdf;



  let html = '';

  s.exos.forEach((exo, ei) => {

    const cls = exo.type === 'hist' ? 'hist' : exo.type === 'geo' ? 'geo' : 'emc';

    html += `<div class="exo-header"><span class="exo-badge ${cls}">${exo.label}</span><span class="exo-pts">${exo.pts} pts</span></div>`;

    exo.questions.forEach((q, qi) => {

      const qid = `q_${s.id}_${ei}_${qi}`;

      html += `

        <div class="qblock">

          <div class="qnum">Q${ei+1}.${qi+1}</div>

          <div class="qtexte">${q.texte}</div>

          <textarea id="ans_${qid}" placeholder="Ta réponse ici..."></textarea>

          <div class="qbtns">

            <button class="btn-corriger" onclick="corriger(${idx},${ei},${qi},'${qid}')">🤖 Correction IA</button>

            <button class="btn-off" onclick="toggleOff('off_${qid}')">📖 Correction officielle</button>

          </div>

          <div class="corr-off-toggle" id="off_${qid}">

            <strong>📖 CORRECTION OFFICIELLE</strong><br>${q.rep}

          </div>

          <div class="corr-panel" id="panel_${qid}"></div>

        </div>`;

    });

  });



  html += `<div class="export-zone">

    <p>📄 Sauvegarder toutes les corrections IA de ce sujet</p>

    <button class="btn-pdf" onclick="exportPDF(${idx})">📄 Générer PDF</button>

    <button class="sv-dl" style="margin-left:8px;background:#e87a7a;color:#09090f" onclick="effacerCorrections(${idx})">🗑 Effacer corrections</button>

  </div>`;



  document.getElementById('svContent').innerHTML = html;

  window.scrollTo(0,0);

}



function retour() {

  document.getElementById('landing').style.display = 'block';

  document.getElementById('sujetView').classList.remove('active');

  window.scrollTo(0,0);

}



function toggleOff(id) {

  document.getElementById(id).classList.toggle('show');

}

async function corriger(sIdx, ei, qi, qid) {

  const s = SUJETS[sIdx];

  const q = s.exos[ei].questions[qi];

  const ans = document.getElementById('ans_'+qid).value.trim();

  if (!ans) { alert("Écris ta réponse d'abord !"); return; }



  const panel = document.getElementById('panel_'+qid);

  const btn = panel.previousElementSibling.querySelector('.btn-corriger');

  panel.classList.add('show');

  panel.innerHTML = '<div class="loading"><span class="dot"></span>Correction IA en cours...</div>';

  if (btn) btn.disabled = true;



  const pts = s.exos[ei].pts;

  const exo_type = s.exos[ei].type || 'hist';

  const mat_label = exo_type==='hist' ? 'Histoire' : exo_type==='geo' ? 'Géographie' : 'EMC';

  

  var system = 'Tu es correcteur DNB HISTOIRE-GEOGRAPHIE-EMC — exigeant, bienveillant, precis.' + ' Question (' + pts + ' pts). COURS=' + Math.round(pts/3*2)/2 + ' pts / REDACTION=' + Math.round(pts/3*2)/2 + ' pts / METHODE=' + Math.round(pts/3*2)/2 + ' pts.' + ' COURS : dates, acteurs, notions du programme, reperes geographiques.' + ' REDACTION : paragraphe argumente, connecteurs logiques, vocabulaire disciplinaire.' + ' METHODE : exploitation document, fait+argument+exemple, structure intro-dev-conclu.' + ' NOTE arrondie au 0.5 pres. JAMAIS 1.3/4.' + ' Question : ' + qTexteClean + ' Reponds UNIQUEMENT en JSON : {note_cours:X,note_redaction:X,note_methode:X,note_finale:X,sur:' + pts + ',commentaire:"3 lignes",pistes:"2 conseils"}';

  

  const prompt = `Sujet: ${s.titre}\nQuestion: ${q.texte}\nCorrection attendue: ${q.rep}\nRéponse élève: ${ans}`;



  try {

    // Utilisation de window.callIA (fourni par proxy-client.js)

    const txt = await window.callIA(prompt, system);

    const json = (window.safeJSON ? window.safeJSON(txt) : (()=>{try{return JSON.parse(txt.replace(/```json|```/g,'').trim());}catch(e){return null;}})());

    

    if (!STORE[s.id]) STORE[s.id] = [];

    STORE[s.id].push({exo:s.exos[ei].label, qi:qi+1, question:q.texte, correctionIA:txt, correctionOff:q.rep, pts});

    saveCorrections();



    panel.innerHTML = `

      <div class="corr-ia">

        <div class="corr-note">${json ? '✓ Note : ' + json.note : ''}</div>

        ${json && json.cours_su ? '<div class="corr-conseil" style="margin-bottom:4px">📚 <strong>Cours :</strong> ' + json.cours_su + '</div>' : ''}

        ${json && json.methode ? '<div class="corr-conseil" style="margin-bottom:6px">✏️ <strong>Méthode :</strong> ' + json.methode + '</div>' : ''}

        <div class="corr-txt">${json ? json.commentaire : txt}</div>

        ${json && json.pistes ? '<div class="corr-conseil" style="margin-top:8px;color:#e8c87a">🎯 <strong>Pistes :</strong> ' + json.pistes + '</div>' : ''}

      </div>

      <div class="corr-off"><strong>📖 CORRECTION OFFICIELLE</strong><br>${q.rep}</div>

      <button class="btn-copy" onclick="copier(this)">📋 Copier</button>`;

  } catch(e) {

    let errMsg = e.message;

    if (errMsg === 'ACCES_BLOQUE') errMsg = 'Accès bloqué. Veuillez activer votre abonnement.';

    panel.innerHTML = '<div class="erreur">Erreur: '+errMsg+'</div>';

  }

  if (btn) btn.disabled = false;

}



async function copier(btn) {

  try {

    await navigator.clipboard.writeText(btn.closest('.corr-panel').innerText);

    btn.textContent = '✓ Copié !';

    setTimeout(()=>btn.textContent='📋 Copier',1500);

  } catch(e) {}

}



function effacerCorrections(sIdx) {

  const s = SUJETS[sIdx];

  if (!confirm('Effacer toutes les corrections sauvegardées pour ce sujet ?')) return;

  delete STORE[s.id];

  saveCorrections();

  alert('Corrections effacées.');

}



function exportPDF(sIdx) {

  const s = SUJETS[sIdx];

  const data = STORE[s.id];

  if (!data || !data.length) { alert("Corrige au moins une question d'abord."); return; }

  let totalObt = 0, totalMax = 0;

  data.forEach(c => { totalObt += c.pts; totalMax += c.pts; });

  

  let html = `<html><head><meta charset="UTF-8"><style>

    body{font-family:Arial,sans-serif;font-size:13px;color:#111;padding:2rem;}

    h1{font-size:16px;border-bottom:2px solid #f5a623;color:#b87800;padding-bottom:6px;}

    h2{font-size:13px;margin-top:1.2rem;border-left:4px solid #f5a623;padding-left:8px;color:#333;}

    .ia{background:#fffbf0;border-left:3px solid #f5a623;padding:8px;border-radius:4px;margin-bottom:6px;}

    .off{background:#fff0f0;border-left:3px solid #e74c3c;padding:8px;border-radius:4px;}

    .total{margin-top:16px;padding:10px;background:#f5f5f5;border-radius:6px;font-weight:bold;}

  </style></head><body>

  <h1>DNB ${s.annee} — ${s.session}</h1>

  <p>Généré le ${new Date().toLocaleDateString('fr-FR')} · ${data.length} question(s)</p>`;

  data.forEach(c => {

    html += `<h2>${c.exo} — Q${c.qi} (${c.pts} pts)</h2>

    <div class="ia">🤖 ${c.correctionIA}</div>

    <div class="off">📖 ${c.correctionOff}</div>`;

  });

  html += `<div class="total">📊 Note totale estimée : ${totalObt} / ${totalMax} pts</div></body></html>`;

  const win = window.open('','_blank');

  win.document.write(html);

  win.document.close();

  win.print();

}



// Initialisation

buildLanding();
