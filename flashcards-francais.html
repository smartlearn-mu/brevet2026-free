<script>

let currentChapitre = 1;

let currentCartes = [];

let currentIndex = 0;

let currentCard = null;

let progression = {};



function getKey() { return `fc_fr_ch${currentChapitre}`; }

function save() { localStorage.setItem(getKey(), JSON.stringify(progression)); }

function load() { const s = localStorage.getItem(getKey()); progression = s ? JSON.parse(s) : {}; }

function cardKey(q) { return q.substring(0,60); }

function getScore(q) { return progression[cardKey(q)]?.score || 0; }

function setScore(q, v) { progression[cardKey(q)] = { score: Math.min(3,v), date: new Date().toISOString() }; save(); }



function init() {

  const cartes = CHAPITRES_FR[currentChapitre]?.cartes || [];

  let modif = false;

  cartes.forEach(c => { if (!progression[cardKey(c.q)]) { progression[cardKey(c.q)] = { score:0, date:'' }; modif=true; } });

  if (modif) save();

}



function melanger(a) {

  for (let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}

  return a;

}



function selectionCartes() {

  const cartes = CHAPITRES_FR[currentChapitre]?.cartes || [];

  const nouvelles = cartes.filter(c=>getScore(c.q)===0).slice(0,20);

  const erreurs = cartes.filter(c=>getScore(c.q)>0&&getScore(c.q)<3).slice(0,10);

  const revoir = cartes.filter(c=>getScore(c.q)>=3).slice(0,5);

  const sel = [...nouvelles,...erreurs,...revoir];

  const ids = new Set();

  return melanger(sel.filter(c=>{ if(ids.has(c.q))return false; ids.add(c.q); return true; }));

}



function stats() {

  const cartes = CHAPITRES_FR[currentChapitre]?.cartes || [];

  const mait = cartes.filter(c=>getScore(c.q)>=3).length;

  document.getElementById('stats').innerHTML = `📚 Ch.${currentChapitre} : ${CHAPITRES_FR[currentChapitre]?.titre || ''} &nbsp;|&nbsp; ✅ ${mait}/${cartes.length} maîtrisées (${cartes.length?Math.round(mait/cartes.length*100):0}%)`;

}



function afficher() {

  if (currentIndex >= currentCartes.length) {

    document.getElementById('card-area').innerHTML = '<div class="progress">🎉 Chapitre terminé !</div>';

    document.getElementById('session-stats').innerHTML = `✅ ${currentCartes.length} cartes revues.`;

    stats(); return;

  }

  currentCard = currentCartes[currentIndex];

  document.getElementById('card-area').innerHTML = `

    <div class="flashcard" onclick="reveler()">

      <div class="question">📖 ${currentCard.q}</div>

      <div class="answer" id="ans">📌 ${currentCard.r}</div>

      <div class="show-answer">👆 Cliquez pour voir la réponse</div>

    </div>

    <div class="btn-group" id="btns" style="display:none">

      <button onclick="repondre(true)">✅ Je sais (${getScore(currentCard.q)}/3)</button>

      <button onclick="repondre(false)">❌ Je ne sais pas</button>

    </div>`;

  document.getElementById('session-stats').innerHTML = `📌 ${currentIndex+1}/${currentCartes.length}`;

}



window.reveler = () => {

  document.getElementById('ans').style.display = 'block';

  document.getElementById('btns').style.display = 'flex';

};



window.repondre = (ok) => {

  let s = getScore(currentCard.q);

  s = ok ? Math.min(s+1,3) : 0;

  setScore(currentCard.q, s);

  currentIndex++;

  afficher();

  stats();

};



function demarrer() {

  load(); init();

  currentCartes = selectionCartes();

  currentIndex = 0;

  stats();

  if (!currentCartes.length) { document.getElementById('card-area').innerHTML = '<div class="progress">🎉 Toutes les cartes maîtrisées !</div>'; return; }

  afficher();

}



function remplirSelect() {

  const s = document.getElementById('chapitreSelect');

  s.innerHTML = '';

  Object.entries(CHAPITRES_FR).forEach(([n,ch]) => {

    const o = document.createElement('option'); o.value=n; o.textContent=`${n}. ${ch.titre}`; s.appendChild(o);

  });

  s.value = currentChapitre;

}



document.getElementById('changerBtn').onclick = () => { currentChapitre = parseInt(document.getElementById('chapitreSelect').value); demarrer(); };

document.getElementById('resetChapitreBtn').onclick = () => { if(confirm('Reset ce chapitre ?')){ localStorage.removeItem(getKey()); demarrer(); } };

document.getElementById('resetAllBtn').onclick = () => { if(confirm('⚠️ Reset tout ?')){ Object.keys(CHAPITRES_FR).forEach(n=>localStorage.removeItem(`fc_fr_ch${n}`)); demarrer(); } };



remplirSelect();

demarrer();

</script>
