// FONCTIONS D'AFFICHAGE

// ============================================================



function esc(s) {

  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

}



function buildGrid() {

  const grid = document.getElementById('grid');

  let html = '';

  SUJETS.forEach((s, idx) => {

    html += '<div class="card" onclick="ouvrirSujet(' + idx + ')">'

      + '<div class="card-top"><span class="card-num">Sujet ' + s.id + '</span><span class="badge">' + s.annee + '</span></div>'

      + '<div class="card-titre">' + esc(s.titre) + '</div>'

      + '<div class="card-meta">' + esc(s.session) + '</div>'

      + (s.pdf ? '<a class="card-pdf" href="' + s.pdf + '" target="_blank" onclick="event.stopPropagation()">📄 Sujet officiel PDF</a>' : '')

      + '</div>';

  });

  grid.innerHTML = html;

}



function ouvrirSujet(idx) {

  const s = SUJETS[idx];

  document.getElementById('svTitre').innerHTML = 'DNB ' + s.annee + ' — ' + s.session;

  document.getElementById('svSub').textContent = s.titre;

  document.getElementById('svDl').href = s.pdf;

  document.getElementById('btnPdfExport').onclick = () => exportPDF(idx);



  let html = '';

  s.exos.forEach((exo, ei) => {

    const cls = exo.type === 'svt' ? 'badge-svt' : exo.type === 'pc' ? 'badge-pc' : 'badge-techno';

    const label = exo.type === 'svt' ? 'SVT' : exo.type === 'pc' ? 'Physique-Chimie' : 'Technologie';

    html += '<div class="exo">'

      + '<div class="exo-head"><span class="exo-badge ' + cls + '">' + label + '</span><span class="exo-label">' + esc(exo.label) + '</span></div>';

    exo.questions.forEach((q, qi) => {

      const qid = 'q_' + s.id + '_' + ei + '_' + qi;

      html += '<div class="question">'

        + '<div class="q-texte">' + esc(q.texte) + '</div>'

        + '<textarea class="answer-area" id="ans_' + qid + '" placeholder="Écris ta réponse ici..."></textarea>'

        + '<button class="btn-corriger" onclick="corriger(' + idx + ',' + ei + ',' + qi + ',\'' + qid + '\')">✦ Corriger avec IA</button>'

        + '<div class="panel" id="panel_' + qid + '"></div>'

        + '</div>';

    });

    html += '</div>';

  });



  document.getElementById('svContent').innerHTML = html;

  document.getElementById('landing').style.display = 'none';

  const sv = document.getElementById('sujetView');

  sv.style.display = 'block';

  sv.classList.add('active');

  window.scrollTo(0,0);

}



function retour() {

  document.getElementById('sujetView').style.display = 'none';

  document.getElementById('sujetView').classList.remove('active');

  document.getElementById('landing').style.display = 'block';

  window.scrollTo(0,0);

}



// ============================================================

// CORRECTION IA (utilise window.callIA du proxy-client.js)

// ============================================================



function badge(val) {

  const ok = (val === 'Oui' || val === 'OK');

  const partiel = (val === 'Partiel');

  const bg = ok ? 'rgba(94,207,177,.15)' : partiel ? 'rgba(245,166,35,.15)' : 'rgba(232,122,122,.15)';

  const col = ok ? '#5ecfb1' : partiel ? '#f5a623' : '#e87a7a';

  const icon = ok ? '✓' : partiel ? '◑' : '✗';

  return '<span style="background:'+bg+';color:'+col+';border:1px solid '+col+';border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700;">'+icon+' '+esc(val)+'</span>';

}



async function corriger(sIdx, ei, qi, qid) {

  const s = SUJETS[sIdx];

  const exo = s.exos[ei];

  const q = exo.questions[qi];

  const ans = document.getElementById('ans_' + qid).value.trim();

  if (!ans) { alert("Écris ta réponse d'abord !"); return; }



  const panel = document.getElementById('panel_' + qid);

  const btn = panel.previousElementSibling?.querySelector('.btn-corriger');

  panel.classList.add('show');

  panel.innerHTML = '<div class="loading"><span class="dot"></span>Correction en cours...</div>';

  if (btn) btn.disabled = true;



  const disc = exo.type === 'svt' ? 'SVT' : exo.type === 'pc' ? 'Physique-Chimie' : 'Technologie';

  const pts = exo.pts;

  const qTexteClean = q.texte.split('\n').join(' ').substring(0,300);



  // SYSTEME DE NOTATION CORRIGÉ - JSON attendu par l'affichage
  const system = `Tu es un correcteur expert du DNB en SCIENCES (${disc}), exigeant et bienveillant.

Ta correction doit être APPROFONDIE. Réponds UNIQUEMENT en JSON valide avec cette structure exacte :
{
  "note": "X/${pts}",
  "cours_su": "Oui" ou "Partiel" ou "Non",
  "methode": "Oui" ou "Partiel" ou "Non",
  "commentaire": "Analyse détaillée de la réponse (3-5 lignes)",
  "pistes": "2 ou 3 conseils précis pour progresser"
}

Critères DNB SCIENCES :
- cours_su : formules, lois, vocabulaire scientifique corrects ?
- methode : raisonnement logique, étapes visibles, exploitation des documents, conclusion explicite
- La note sur ${pts} pts doit refléter la qualité de la réponse

Règle de notation : la note maximale UNIQUEMENT si réponse + méthode + justification sont tous corrects.`;



  const prompt = `Sujet: ${s.titre} (${s.annee})

Exercice: ${exo.label}

Question: ${qTexteClean}

Correction attendue: ${q.rep}

Réponse élève: ${ans}`;



  try {

    const txt = await window.callIA(prompt, system);

    const json = window.safeJSON ? window.safeJSON(txt) : (()=>{try{return JSON.parse(txt.replace(/```json|```/g,'').trim());}catch(e){return null;}})();

    

    if (!STORE[s.id]) STORE[s.id] = [];

    STORE[s.id].push({

      exo: exo.label, qi: qi+1, question: q.texte.substring(0,80),

      reponseEleve: ans, correctionIA: json ? json.commentaire : txt,

      correctionOff: q.rep, pts: pts, note: json ? json.note : null

    });

    saveCorrections();



    panel.innerHTML = `

      <div class="corr-ia">

        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;">

          <div class="corr-note">✓ ${json && json.note ? json.note : '?'} / ${pts}</div>

          <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">

            <span style="font-size:10px;color:#9090a8;">Cours</span>${badge(json ? json.cours_su : '?')}

            <span style="font-size:10px;color:#9090a8;margin-left:6px;">Méthode</span>${badge(json ? json.methode : '?')}

          </div>

        </div>

        <div class="corr-txt">${json && json.commentaire ? json.commentaire : txt}</div>

        ${json && json.pistes ? '<div class="corr-conseil" style="margin-top:8px;color:#e8c87a">🎯 ' + esc(json.pistes) + '</div>' : ''}

      </div>

      <div class="corr-off"><strong>📖 CORRECTION OFFICIELLE</strong><br>${esc(q.rep)}</div>

      <button class="btn-copy" onclick="copier(this)">📋 Copier</button>`;

  } catch(err) {

    let errMsg = err.message;

    if (errMsg === 'ACCES_BLOQUE') errMsg = 'Accès bloqué. Veuillez activer votre abonnement.';

    panel.innerHTML = '<div style="color:#e87a7a">❌ ' + errMsg + '</div>';

  }

  if (btn) btn.disabled = false;

}



async function copier(btn) {

  try {

    await navigator.clipboard.writeText(btn.parentElement.innerText);

    btn.textContent = '✓ Copié';

    setTimeout(() => btn.textContent = '📋 Copier', 2000);

  } catch(e) {}

}



function exportPDF(sIdx) {

  const s = SUJETS[sIdx];

  const data = STORE[s.id];

  if (!data || !data.length) { alert("Corrige au moins une question d'abord."); return; }

  let totalObt = 0, totalMax = 0;

  data.forEach(c => { if (c.note != null) totalObt += parseFloat(c.note); totalMax += c.pts; });

  

  let html = `<html><head><meta charset="UTF-8"><style>

    body{font-family:Arial,sans-serif;font-size:13px;color:#111;padding:2rem;}

    h1{font-size:16px;border-bottom:2px solid #5eaacf;color:#2a6a8a;padding-bottom:6px;}

    h2{font-size:13px;margin-top:1.2rem;border-left:4px solid #5eaacf;padding-left:8px;color:#333;}

    .ia{background:#e6f4f9;border-left:3px solid #5eaacf;padding:8px;border-radius:4px;margin-bottom:6px;}

    .off{background:#e6f9ee;border-left:3px solid #34c76b;padding:8px;border-radius:4px;}

    .total{margin-top:16px;padding:10px;background:#f5f5f5;border-radius:6px;font-weight:bold;}

  </style></head><body>

  <h1>🔬 Sciences DNB ${s.annee} — ${s.session}</h1>

  <p>Généré le ${new Date().toLocaleDateString('fr-FR')} · ${data.length} question(s)</p>`;

  data.forEach(c => {

    html += `<h2>${c.exo} — Q${c.qi} (${c.pts} pts)</h2>

    <div class="ia">🤖 ${c.correctionIA}</div>

    <div class="off">📖 ${c.correctionOff}</div>`;

  });

  html += `<div class="total">📊 Note totale estimée : ${totalObt.toFixed(1)} / ${totalMax} pts (${Math.round(totalObt/totalMax*100)}%)</div></body></html>`;

  const win = window.open('','_blank');

  win.document.write(html);

  win.document.close();

  win.print();

}

buildGrid();
