function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function buildGrid() {
  const grid = document.getElementById('grid');
  let html = '';
  SUJETS.forEach((s, idx) => {
    html += '<div class="card" onclick="ouvrirSujet(' + idx + ')">'
      + '<div class="card-top"><span class="card-num">Sujet ' + s.id + '</span><span class="badge">' + s.annee + '</span></div>'
      + '<div class="card-titre">' + esc(s.titre) + '</div>'
      + '<div class="card-meta">' + esc(s.session) + '</div>'
      + '<a class="card-pdf" href="' + s.pdf + '" target="_blank" onclick="event.stopPropagation()">ðŸ“„ Sujet officiel PDF</a>'
      + '</div>';
  });
  grid.innerHTML = html;
}

function ouvrirSujet(idx) {
  const s = SUJETS[idx];
  document.getElementById('svTitre').innerHTML = 'DNB ' + s.annee + ' â€” ' + s.session;
  document.getElementById('svSub').textContent = s.titre;
  document.getElementById('svDl').href = s.pdf;
  document.getElementById('btnPdfExport').onclick = () => exportPDF(idx);

  let html = '';
  s.exos.forEach((exo, ei) => {
    const cls = exo.type === 'auto' ? 'badge-auto' : 'badge-pb';
    html += '<div class="exo">'
      + '<div class="exo-head"><span class="exo-badge ' + cls + '">' + (exo.type==='auto'?'Automatismes':'ProblÃ¨mes') + '</span><span class="exo-label">' + esc(exo.label) + '</span></div>';
    exo.questions.forEach((q, qi) => {
      const qid = 'q_' + s.id + '_' + ei + '_' + qi;
      html += '<div class="question">'
        + '<div class="q-texte">' + esc(q.texte).replace(/\n/g,'<br>') + '</div>'
        + '<div class="answer-wrap">'
        + '<textarea class="answer-area" id="ans_' + qid + '" placeholder="Ã‰cris ta rÃ©ponse ici..."></textarea>'
        + '<button class="btn-corriger" onclick="corriger(' + idx + ',' + ei + ',' + qi + ',\'' + qid + '\')">âœ¦ Corriger avec IA</button>'
        + '</div>'
        + '<div class="panel" id="panel_' + qid + '"></div>'
        + '</div>';
    });
    html += '</div>';
  });

  document.getElementById('svContent').innerHTML = html;
  document.getElementById('landing').style.display = 'none';
  const sv = document.getElementById('sujetView');
  sv.style.display = 'block';
  sv.classList.add('active');
  window.scrollTo(0,0);
}

function retour() {
  document.getElementById('sujetView').style.display = 'none';
  document.getElementById('sujetView').classList.remove('active');
  document.getElementById('landing').style.display = 'block';
  window.scrollTo(0,0);
}

function badge(val) {
  const ok = (val === 'Oui' || val === 'OK');
  const partiel = (val === 'Partiel');
  const bg = ok ? 'rgba(94,207,177,.15)' : partiel ? 'rgba(245,166,35,.15)' : 'rgba(232,122,122,.15)';
  const col = ok ? '#5ecfb1' : partiel ? '#f5a623' : '#e87a7a';
  const icon = ok ? 'âœ“' : partiel ? 'â—‘' : 'âœ—';
  return '<span style="background:'+bg+';color:'+col+';border:1px solid '+col+';border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700;">'+icon+' '+esc(val)+'</span>';
}

function exportPDF(sIdx) {

  const data = STORE[s.id];
  if (!data || !data.length) { alert("Corrige au moins une question d'abord."); return; }
  let totalObt = 0, totalMax = 0;
  data.forEach(c => { if (c.note != null) totalObt += parseFloat(c.note); totalMax += c.pts; });
  
  let html = `<html><head><meta charset="UTF-8"><style>
