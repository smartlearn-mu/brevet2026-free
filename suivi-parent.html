tn">Payer 29 EUR via Wise</a><hr style="border:none;border-top:1px solid #2a2a38;margin:16px 0;"><input type="text" class="monet-input" id="monet-code-input" placeholder="Votre code" maxlength="40"><div><button class="monet-btn" id="monet-valider">Valider le code</button>'+(canClose?'<button class="monet-btn ghost" id="monet-close">Continuer essai</button>':'')+' </div><div class="monet-msg" id="monet-msg"></div></div>';document.body.appendChild(o);document.getElementById('monet-valider').onclick=function(){var code=document.getElementById('monet-code-input').value.trim();var msg=document.getElementById('monet-msg');if(!code){msg.style.color='#e87a7a';msg.textContent='Entrez un code.';return;}msg.style.color='#9090a8';msg.textContent='Verification...';validerCode(code,function(r){if(r.success){msg.style.color='#5ecfb1';msg.textContent=r.message;setTimeout(function(){document.getElementById('monet-overlay').remove();location.reload();},1500);}else{msg.style.color='#e87a7a';msg.textContent=r.message;}});};var cl=document.getElementById('monet-close');if(cl)cl.onclick=function(){document.getElementById('monet-overlay').remove();};}

<script>

var eleve = 'wassil';

var chapMatiere = 'francais';



var MATIERES = [

  {id:'francais', nom:'Français',     ico:'🇫🇷', couleur:'#4f8ef7', cls:'mat-fr'},

  {id:'maths',    nom:'Maths',        ico:'📐', couleur:'#e8c87a', cls:'mat-ma'},

  {id:'histoire', nom:'Histoire-Géo', ico:'🌍', couleur:'#f5a623', cls:'mat-hi'},

  {id:'sciences', nom:'Sciences',     ico:'🔬', couleur:'#5eaacf', cls:'mat-sc'}

];



// ─── Lecture localStorage avec gestion de l'ancien format (pourcentage seul) ───

function getSessions(matiere) {

  try { 

    var sessions = JSON.parse(localStorage.getItem('suivi_sessions_'+matiere+'_'+eleve)||'[]');

    // Conversion pour compatibilité avec l'ancien format (noteSur non défini)

    return sessions.map(function(s){

      if(s.noteSur === undefined && s.pourcentage !== undefined) {

        // Ancien format : on simule une note sur 20 (pour compatibilité)

        return Object.assign({}, s, {noteSur: 20, noteObtenue: Math.round(s.pourcentage * 20 / 100)});

      }

      return s;

    });

  }

  catch(e){ return []; }

}



function getAllSessions() {

  var all = [];

  MATIERES.forEach(function(m){

    getSessions(m.id).forEach(function(s){ 

      all.push(Object.assign({}, s, {

        matiereId: m.id, 

        matiereNom: m.nom, 

        matiereIco: m.ico, 

        couleur: m.couleur

      })); 

    });

  });

  return all.sort(function(a,b){ return new Date(b.date)-new Date(a.date); });

}



// ─── Formater une note (X/Y) ───

function formatNote(obtenue, sur) {

  if(sur === undefined || sur === 0) return obtenue + '/?';

  return obtenue + '/' + sur;

}



// ─── Calculer le pourcentage à partir de noteObtenue/noteSur ───

function calculerPourcentage(session) {

  if(session.noteSur && session.noteSur > 0) {

    return Math.round(session.noteObtenue / session.noteSur * 100);

  }

  return session.pourcentage || 0;

}



// ─── Note sur 10 (pour l'affichage global) : pourcentage >= 50% = bonne réponse ───

function pctToNote(pct) {

  return Math.round(pct / 10);

}



function noteClass(n) {

  return n >= 8 ? 'vert' : n >= 5 ? 'orange' : 'rouge';

}



function noteBg(n) {

  return n >= 8 ? 'rgba(94,207,177,.15)' : n >= 5 ? 'rgba(232,200,122,.15)' : 'rgba(232,122,122,.15)';

}



function noteBorder(n) {

  return n >= 8 ? '#5ecfb1' : n >= 5 ? '#e8c87a' : '#e87a7a';

}



function noteLibelle(n) {

  return n >= 9 ? '🌟 Excellent' : n >= 8 ? '👍 Très bien' : n >= 6 ? '👌 Bien' : n >= 5 ? '💪 Passable' : '📚 À retravailler';

}



function fmtDate(str) {

  try { var d=new Date(str); return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}); }

  catch(e){ return str; }

}



// ─── Alerte ───

function renderAlerte() {

  var all = getAllSessions();

  var el = document.getElementById('alerte');

  if(!all.length){ el.style.display='none'; return; }

  var diff = Math.floor((Date.now()-new Date(all[0].date))/(1000*60*60*24));

  if(diff >= 2) {

    el.style.display='block';

    el.innerHTML = '⚠️ <strong>'+(eleve==='eleve1'?'Élève 1':'Élève 2')+'</strong> n\'a pas travaillé depuis <strong>'+diff+' jours</strong>. Dernière session : '+fmtDate(all[0].date);

  } else {

    el.style.display='none';

  }

}



// ─── Note globale (moyenne des pourcentages, affichée en X/Y simulé) ───

function renderNoteGlobale() {

  var all = getAllSessions().slice(0,10);

  var el = document.getElementById('noteGlobale');

  if(!all.length) {

    el.innerHTML = '<div class="vide" style="width:100%">Aucune session enregistrée pour l\'instant.</div>';

    return;

  }

  var moyPct = Math.round(all.reduce(function(a,s){return a + calculerPourcentage(s);},0)/all.length);

  var note = pctToNote(moyPct);

  var coulBg = noteBg(note);

  var coulBord = noteBorder(note);

  var libelle = noteLibelle(note);

  var nb = getAllSessions().length;

  var dern = all[0];

  var diff = Math.floor((Date.now()-new Date(dern.date))/(1000*60*60*24));

  var diffTxt = diff===0?'aujourd\'hui':diff===1?'hier':'il y a '+diff+' jours';

  

  // tendance

  var t5 = all.slice(0,5).map(function(s){return calculerPourcentage(s);});

  var tend = t5.length>=2?(t5[0]>t5[t5.length-1]?'↑ En progression':t5[0]<t5[t5.length-1]?'↓ En baisse':'→ Stable'):'—';

  var tendCol = tend.includes('↑')?'#5ecfb1':tend.includes('↓')?'#e87a7a':'#9090a8';



  el.innerHTML =

    '<div class="note-cercle" style="background:'+coulBg+';border:3px solid '+coulBord+'">'

    +'<div class="note-num" style="color:'+coulBord+'">'+note+'</div>'

    +'<div class="note-denom">/10</div>'

    +'</div>'

    +'<div class="note-infos">'

    +'<div class="note-titre">Note globale de '+(eleve==='eleve1'?'Élève 1':'Élève 2')+' — moyenne des 10 dernières sessions</div>'

    +'<div class="note-sub">'

    +'<strong>'+moyPct+'%</strong> de bonnes réponses en moyenne<br>'

    +'<strong>'+nb+'</strong> session'+(nb>1?'s':'')+' enregistrée'+(nb>1?'s':'')+' · Dernière : <strong>'+fmtDate(dern.date)+'</strong><br>'

    +'<span style="color:'+tendCol+'"><strong>'+tend+'</strong></span> sur les 5 dernières sessions'

    +'</div>'

    +'<span class="badge" style="background:'+coulBg+';color:'+coulBord+';border:1px solid '+coulBord+'">'+libelle+'</span>'

    +'</div>';

}



// ─── Cartes matières (avec note sur le vrai dénominateur) ───

function renderMatieres() {

  var html = '';

  MATIERES.forEach(function(m){

    var sessions = getSessions(m.id);

    if(!sessions.length) {

      html += '<div class="matiere-card '+m.cls+'">'

        +'<div class="mat-head"><span class="mat-nom">'+m.ico+' '+m.nom+'</span>'

        +'<div style="text-align:right"><div class="mat-note" style="color:#5a5a72">—</div><div class="mat-note-label">/10</div></div></div>'

        +'<div class="mat-bar-wrap"><div class="mat-bar"><div class="mat-fill" style="width:0%;background:'+m.couleur+'"></div></div>'

        +'<div class="mat-bar-label"><span>0%</span><span>100%</span></div></div>'

        +'<div class="mat-sessions">0 session</div></div>';

      return;

    }

    // Prendre les 5 dernières sessions pour la moyenne

    var recentes = sessions.slice(0,5);

    var moyPct = Math.round(recentes.reduce(function(a,s){return a + calculerPourcentage(s);},0)/recentes.length);

    var note = pctToNote(moyPct);

    var col = noteBorder(note);

    

    // Dernière session avec note réelle

    var dern = sessions[0];

    var dernNote = dern.noteSur ? formatNote(dern.noteObtenue, dern.noteSur) : dern.pourcentage+'%';

    

    html += '<div class="matiere-card '+m.cls+'">'

      +'<div class="mat-head"><span class="mat-nom">'+m.ico+' '+m.nom+'</span>'

      +'<div style="text-align:right"><div class="mat-note" style="color:'+col+'">'+note+'</div><div class="mat-note-label">/10 (moy)</div></div></div>'

      +'<div class="mat-bar-wrap"><div class="mat-bar"><div class="mat-fill" style="width:'+moyPct+'%;background:'+m.couleur+'"></div></div>'

      +'<div class="mat-bar-label"><span style="color:'+col+'">'+moyPct+'%</span><span style="color:#5a5a72">100%</span></div></div>'

      +'<div class="mat-sessions">'+sessions.length+' session'+(sessions.length>1?'s':'')+' · Dernière : '+dernNote+' · '+noteLibelle(note)+'</div></div>';

  });

  document.getElementById('matieresGrid').innerHTML = html || '<div class="vide">Aucune donnée.</div>';

}



// ─── Chapitres faibles / forts ───

function buildChapTabs() {

  var html = '';

  MATIERES.forEach(function(m){

    html += '<button class="ctab'+(m.id===chapMatiere?' active':'')

      +'" data-id="'+m.id+'">'+m.ico+' '+m.nom+'</button>';

  });

  document.getElementById('chapTabs').innerHTML = html;

  document.querySelectorAll('.ctab').forEach(function(btn){

    btn.addEventListener('click', function(){

      chapMatiere = this.dataset.id;

      document.querySelectorAll('.ctab').forEach(function(b){b.classList.remove('active');});

      this.classList.add('active');

      renderChapitres();

    });

  });

}



function renderChapitres() {

  var sessions = getSessions(chapMatiere).slice(0,5);

  var el = document.getElementById('chapContent');

  if(!sessions.length){

    el.innerHTML='<div class="vide">Pas encore de données pour cette matière.</div>';

    return;

  }

  // Calculer la moyenne par chapitre sur les 5 dernières sessions

  var taux = {};

  sessions.forEach(function(s){

    if(s.chapitresTaux) Object.keys(s.chapitresTaux).forEach(function(ch){

      if(!taux[ch]) taux[ch]=[];

      taux[ch].push(s.chapitresTaux[ch]);

    });

  });

  if(!Object.keys(taux).length){

    el.innerHTML='<div class="vide">Pas encore de données chapitres.</div>';

    return;

  }



  var items = Object.keys(taux).map(function(ch){

    var moy = Math.round(taux[ch].reduce(function(a,b){return a+b;},0)/taux[ch].length);

    return {ch:ch, moy:moy, note:pctToNote(moy)};

  }).sort(function(a,b){return a.moy-b.moy;});



  var faibles = items.filter(function(i){return i.moy<60;});

  var moyens  = items.filter(function(i){return i.moy>=60&&i.moy<80;});

  var forts   = items.filter(function(i){return i.moy>=80;});



  function renderGroupe(titre, liste, cls, coulNote) {

    if(!liste.length) return '';

    var cards = liste.map(function(i){

      var nc = noteClass(i.note);

      return '<div class="chap-item '+cls+'">'

        +'<div class="chap-nom">'+i.ch+'</div>'

        +'<div class="chap-note '+nc+'">'+i.note+'/10 <span style="font-size:10px;font-weight:400;color:#9090a8">('+i.moy+'%)</span></div>'

        +'</div>';

    }).join('');

    return '<div style="margin-bottom:1rem">'

      +'<div style="font-size:11px;color:#9090a8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">'+titre+'</div>'

      +'<div class="chap-grid">'+cards+'</div>'

      +'</div>';

  }



  el.innerHTML =

    renderGroupe('⚠ À retravailler (note < 6/10)', faibles, 'faible', '#e87a7a')

    + renderGroupe('💪 En progression (6-8/10)', moyens, 'moyen', '#e8c87a')

    + renderGroupe('✅ Points forts (≥ 8/10)', forts, 'fort', '#5ecfb1');

}



// ─── Sessions récentes (affichage X/Y) ───

function renderSessions() {

  var all = getAllSessions().slice(0,15);

  var el = document.getElementById('sessionsBody');

  if(!all.length){ el.innerHTML='<div class="vide">Aucune session enregistrée.</div>'; return; }



  var rows = all.map(function(s){

    var pct = calculerPourcentage(s);

    var note = pctToNote(pct);

    var cls = note>=8?'score-ok':note>=5?'score-mid':'score-bad';

    var chaps = Array.isArray(s.chapitres)?s.chapitres.slice(0,3).join(', ')+(s.chapitres.length>3?'…':''):'—';

    var noteAffichage = s.noteSur ? formatNote(s.noteObtenue, s.noteSur) : pct+'%';

    

    return '<tr>'

      +'<td style="white-space:nowrap">'+fmtDate(s.date)+'</td>'

      +'<td><span class="mat-badge" style="background:rgba(232,200,122,.1);color:'+s.couleur+';border:1px solid '+s.couleur+'">'+s.matiereIco+' '+s.matiereNom+'</span></td>'

      +'<td style="font-size:11px;color:#9090a8">'+chaps+'</td>'

      +'<td><span class="'+cls+'">'+noteAffichage+'</span><span style="font-size:11px;color:#5a5a72"> ('+pct+'%)</span></td>'

      +'</tr>';

  }).join('');



  el.innerHTML = '<table class="sessions-table">'

    +'<thead><tr><th>Date</th><th>Matière</th><th>Chapitres révisés</th><th>Note</th></tr></thead>'

    +'<tbody>'+rows+'</tbody></table>';

}



// ─── Main ───

function setEleve(e) {

  eleve = e;

  document.getElementById('tabW').className='etab'+(e==='eleve1'?' e1':'');

  document.getElementById('tabN').className='etab'+(e==='eleve2'?' e2':'');

  chapMatiere = 'francais';

  render();

}



function render() {

  renderAlerte();

  renderNoteGlobale();

  renderMatieres();

  buildChapTabs();

  renderChapitres();

  renderSessions();

}



function exporterJSON() {

  var data = {};

  MATIERES.forEach(function(m){ data[m.id]=getSessions(m.id); });

  var blob = new Blob([JSON.stringify({date:new Date().toISOString(),eleve:eleve,data:data},null,2)],{type:'application/json'});

  var url = URL.createObjectURL(blob);

  var a=document.createElement('a'); a.href=url;

  a.download='suivi_'+eleve+'_'+new Date().toISOString().slice(0,10)+'.json';

  a.click(); URL.revokeObjectURL(url);

}



function reinitialiser() {

  if(!confirm('Supprimer toutes les données de '+(eleve==='eleve1'?'Élève 1':'Élève 2')+' ?')) return;

  MATIERES.forEach(function(m){ localStorage.removeItem('suivi_sessions_'+m.id+'_'+eleve); });

  render();

}



window.onload = function() {

  document.getElementById('tabW').addEventListener('click',function(){setEleve('eleve1');});

  document.getElementById('tabN').addEventListener('click',function(){setEleve('eleve2');});

  document.getElementById('btnRefresh').addEventListener('click',render);

  document.getElementById('btnExport').addEventListener('click',exporterJSON);

  document.getElementById('btnReset').addEventListener('click',reinitialiser);

  setEleve('eleve1');

};

</script>

<script>

(function(){

  var KEY_TS='brevet_trial_start';

  var KEY_OK='brevet_access';

  var TRIAL=48*60*60*1000;

  function tick(){

    if(localStorage.getItem(KEY_OK)==='1')return;

    var ts=localStorage.getItem(KEY_TS);

    if(!ts){localStorage.setItem(KEY_TS,Date.now()+'');ts=Date.now();}

    else ts=parseInt(ts);

    var rem=TRIAL-(Date.now()-ts);

    if(rem<=0)return;

    var days=Math.ceil(rem/86400000);

    var el=document.getElementById('tbDays');

    if(el)el.textContent='J-'+days;

    document.getElementById('trial-banner').style.display='flex';

  }

  tick();

  setInterval(tick,60000);

})();

</script>
